<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lit Review Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#fafaf9;--bg2:#fff;--bg3:#f5f5f4;--bd:#e7e5e4;--bd2:#d6d3d1;--tx:#1c1917;--tx2:#57534e;--tx3:#a8a29e;--card:#fff;--inp:#fff;--inpbd:#e7e5e4;--nav:#1c1917;--navtx:#fff}
.dark{--bg:#0c0a09;--bg2:#1c1917;--bg3:#292524;--bd:#292524;--bd2:#44403c;--tx:#fafaf9;--tx2:#a8a29e;--tx3:#57534e;--card:#1c1917;--inp:#1c1917;--inpbd:#292524;--nav:#fafaf9;--navtx:#1c1917}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:Georgia,serif;font-size:14px}
input,textarea,select,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.card{background:var(--card);border:1px solid var(--bd)}
.inp{background:var(--inp);border:1px solid var(--inpbd);color:var(--tx);border-radius:8px;padding:8px 12px;width:100%}
.inp:focus{outline:none;box-shadow:0 0 0 2px rgba(16,185,129,.3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.reditor{background:var(--inp);border:1px solid var(--inpbd);border-top:none;border-radius:0 0 8px 8px;padding:10px 12px;color:var(--tx);outline:none;line-height:1.7;min-height:120px}
.reditor:focus{box-shadow:0 0 0 2px rgba(16,185,129,.3)}
.reditor ul,.reditor ol{padding-left:1.5em}
.tbar{display:flex;gap:4px;flex-wrap:wrap;padding:5px 8px;background:var(--bg3);border:1px solid var(--inpbd);border-radius:8px 8px 0 0}
.tbtn{padding:3px 8px;border-radius:5px;border:1px solid var(--bd2);background:var(--inp);color:var(--tx);cursor:pointer;font-size:12px}
.tbtn:hover{opacity:.75}
.doceditor{outline:none;min-height:600px;line-height:1.9;font-size:14px;color:var(--tx)}
.doceditor ul,.doceditor ol{padding-left:1.5em}
.shdl{width:5px;background:var(--bd2);cursor:col-resize;flex-shrink:0}
.shdl:hover{background:#10b981}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── globals ────────────────────────────────────────────────────
var R=React,h=R.createElement,{useState,useEffect,useRef,useCallback}=R;
var SKEY="psych-lit-v7",PPFX="psych-pdf-v7-",PASSKEY="lit-pass-v7",SETKEY="lit-set-v7";
var STATS=["to read","to annotate","to cite"];
var IMP=[
  {lv:1,lb:"Core",      cl:"#7c3aed",bg:"#ede9fe",bd:"#c4b5fd",tx:"#5b21b6"},
  {lv:2,lb:"Major",     cl:"#0ea5e9",bg:"#e0f2fe",bd:"#7dd3fc",tx:"#0369a1"},
  {lv:3,lb:"Supporting",cl:"#14b8a6",bg:"#f0fdfa",bd:"#99f6e4",tx:"#0f766e"},
  {lv:4,lb:"Background",cl:"#9ca3af",bg:"#f9fafb",bd:"#e5e7eb",tx:"#6b7280"},
  {lv:5,lb:"Peripheral",cl:"#d1d5db",bg:"#f9fafb",bd:"#f3f4f6",tx:"#9ca3af"},
];
var HLC=[
  {id:"yellow",bg:"rgba(253,224,71,.4)",bd:"#ca8a04"},
  {id:"green", bg:"rgba(134,239,172,.4)",bd:"#16a34a"},
  {id:"blue",  bg:"rgba(147,197,253,.4)",bd:"#2563eb"},
  {id:"pink",  bg:"rgba(249,168,212,.4)",bd:"#db2777"},
];
var DEFSEC=["Introduction","Literature Review","Argument","Clinical Vignette","Conclusion"];

var ls={
  get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){alert("Storage full.")}},
  del:function(k){try{localStorage.removeItem(k)}catch(e){}},
};

function ep(){return{id:crypto.randomUUID(),projectId:null,author:"",year:"",title:"",journal:"",volume:"",issue:"",pages:"",doi:"",sourceType:"article",themes:[],annotation:"",quotes:[],memo:"",paperSections:[],status:"to read",importance:3,deleted:false,archived:false,highlights:[],hasPdf:false,createdAt:Date.now()}}
function eproj(){return{id:crypto.randomUUID(),name:"",description:"",customThemes:[],paperSections:DEFSEC.slice(),outlineHtml:"",createdAt:Date.now()}}

function getImp(lv){return IMP.find(function(i){return i.lv===(lv||3)})||IMP[2]}
function getHlc(id){return HLC.find(function(c){return c.id===id})||HLC[0]}

function apa7(e){
  if(!e.author&&!e.title)return"";
  var a=e.author?(e.author+(e.author.endsWith(".")?"":".")):""
  var y=e.year?" ("+e.year+").":"";
  var t=e.title?" "+e.title+(e.title.endsWith(".")?"":"."):""
  if(e.sourceType==="book")return a+y+t+(e.journal?" "+e.journal+".":"");
  if(e.sourceType==="chapter")return a+y+t+(e.journal?" In "+e.journal:"")+(e.pages?" (pp. "+e.pages+").":".");
  return a+y+t+(e.journal?" "+e.journal:"")+(e.volume?", "+e.volume:"")+(e.issue?"("+e.issue+")":"")+(e.pages?", "+e.pages:"")+"."+(e.doi?" "+e.doi:"");
}

function stStyle(s){
  if(s==="to read")return{background:"#f3f4f6",color:"#6b7280",border:"1px solid #e5e7eb"};
  if(s==="to annotate")return{background:"#fffbeb",color:"#b45309",border:"1px solid #fde68a"};
  return{background:"#ecfdf5",color:"#065f46",border:"1px solid #a7f3d0"};
}

function buildOutlineHtml(){
  var g="color:#9ca3af;font-style:italic";
  var secs=[
    ["1. Introduction","What are you offering?","Context: What is your topic?\nProblem: What is the problem you\u2019re addressing?\nResponse: How are you going to address this problem? (\u201cIn this paper, I argue that\u2026\u201d)"],
    ["2. Literature Review","The story of your problem","Beginning: Where did the problem start?\nMiddle: How has the problem evolved? Who are the main contributors?\nEnding: Where do things stand now? How does this story set up your contribution?"],
    ["3. Argument","Your original contribution","Claim 1: \u201cI assert X\u2026\u201d\n   Data: \u201c\u2026based on\u2026\u201d\n   Analysis/Interpretation:\nClaim 2:\n   Data:\n   Analysis/Interpretation:\nClaim 3:\n   Data:\n   Analysis/Interpretation:"],
    ["4. Clinical Vignette","Show us what you mean","Introduction: Who is the patient? (Anonymize.)\nArgument: What does this case illustrate?\nBrief History: What do we need to know?\nClinical Process: Can you bring it to life in a scene?\nDiscussion: What do you make of it all?"],
    ["5. Conclusion","In a nutshell\u2026","Restatement of thesis: \u201cI have argued that\u2026\u201d\nBrief summary: Walk us through your major points.\nImplications: Where should we go from here?"]
  ];
  var out=[];
  for(var i=0;i<secs.length;i++){
    var s=secs[i];
    out.push("<p><strong>"+s[0]+"</strong> <span style='"+g+"'>\u2014 "+s[1]+"</span></p>");
    out.push("<p style='"+g+"'>"+s[2].replace(/\n/g,"<br>")+"</p><p><br></p>");
  }
  return out.join("");
}

// ── small helpers ──────────────────────────────────────────────
function Chip(props){
  return h("span",{style:Object.assign({display:"inline-flex",alignItems:"center",gap:4,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:500,border:"1px solid"},props.style)},
    props.dot&&h("span",{style:{width:8,height:8,borderRadius:"50%",background:props.dot,display:"inline-block"}}),
    props.label,
    props.onX&&h("button",{onClick:props.onX,style:{background:"none",border:"none",cursor:"pointer",fontSize:13,lineHeight:1,color:"inherit",marginLeft:2}},"×")
  );
}

function ApaSpan(props){
  var e=props.e,ref=apa7(e);
  if(!ref)return null;
  var tgt=e.sourceType==="book"?e.title:e.journal;
  if(tgt&&ref.includes(tgt)){
    var i=ref.indexOf(tgt);
    return h("span",{style:{fontSize:14,lineHeight:1.6,color:"var(--tx)"}},ref.slice(0,i),h("em",null,tgt),ref.slice(i+tgt.length));
  }
  return h("span",{style:{fontSize:14,lineHeight:1.6,color:"var(--tx)"}},ref);
}

function Toolbar(props){
  function cmd(c){document.execCommand(c,false,null);props.ref&&props.ref.current&&props.ref.current.focus()}
  return h("div",{className:"tbar"},
    h("button",{className:"tbtn",style:{fontWeight:700},onMouseDown:function(e){e.preventDefault();cmd("bold")}},"B"),
    h("button",{className:"tbtn",style:{fontStyle:"italic"},onMouseDown:function(e){e.preventDefault();cmd("italic")}},"I"),
    h("button",{className:"tbtn",style:{textDecoration:"underline"},onMouseDown:function(e){e.preventDefault();cmd("underline")}},"U"),
    h("span",{style:{borderLeft:"1px solid var(--bd2)",margin:"0 2px"}}),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("insertUnorderedList")}},"• List"),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("insertOrderedList")}},"1. List"),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("indent")}},"→"),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("outdent")}},"←")
  );
}

// ── Password Gate ──────────────────────────────────────────────
function PasswordGate(props){
  var stored=ls.get(PASSKEY),setting=!stored;
  var _v=useState(""),val=_v[0],setVal=_v[1];
  var _e=useState(false),err=_e[0],setErr=_e[1];
  function submit(){
    if(setting){if(val.length<3){setErr(true);return}ls.set(PASSKEY,val);props.onUnlock()}
    else{if(val===stored)props.onUnlock();else setErr(true)}
  }
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}},
    h("div",{className:"card",style:{borderRadius:16,padding:32,width:340,boxShadow:"0 4px 24px rgba(0,0,0,.1)"}},
      h("h1",{style:{fontSize:22,marginBottom:4}},"Lit Review"),
      h("p",{style:{color:"var(--tx3)",fontSize:13,marginBottom:20}},setting?"Set a password to protect your research":"Enter your password to continue"),
      h("input",{type:"password",value:val,onChange:function(e){setVal(e.target.value);setErr(false)},onKeyDown:function(e){if(e.key==="Enter")submit()},placeholder:setting?"Choose a password":"Password",autoFocus:true,className:"inp",style:{marginBottom:8,borderColor:err?"#ef4444":""}}),
      err&&h("p",{style:{color:"#ef4444",fontSize:12,marginBottom:8}},setting?"Min 3 characters":"Incorrect password"),
      h("button",{onClick:submit,style:{width:"100%",padding:10,background:"#10b981",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontWeight:600}},setting?"Set Password & Enter":"Unlock")
    )
  );
}

// ── Settings ───────────────────────────────────────────────────
function Settings(props){
  var _ak=useState(function(){var s=ls.get(SETKEY);return s?JSON.parse(s).apiKey||"":""}),ak=_ak[0],setAk=_ak[1];
  var _np=useState(""),np=_np[0],setNp=_np[1];
  var _ok=useState(false),ok=_ok[0],setOk=_ok[1];
  var fr=useRef();
  function saveKey(){var s=ls.get(SETKEY),c=s?JSON.parse(s):{};ls.set(SETKEY,JSON.stringify(Object.assign({},c,{apiKey:ak})))}
  function chPass(){if(np.length>=3){ls.set(PASSKEY,np);setOk(true);setNp("")}}
  function exportData(){
    var blob=new Blob([JSON.stringify({projects:props.projects,entries:props.entries,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="lit-backup-"+Date.now()+".json";a.click();
  }
  function importData(f){
    var r=new FileReader();r.onload=function(){
      try{var d=JSON.parse(r.result);if(d.projects&&d.entries){ls.set(SKEY,JSON.stringify({projects:d.projects,entries:d.entries}));alert("Import successful. Reloading\u2026");window.location.reload()}else alert("Invalid file.")}
      catch(e2){alert("Could not read file.")}
    };r.readAsText(f);
  }
  var row=function(label,content){return h("div",null,h("p",{style:{fontWeight:600,fontSize:14,marginBottom:4}},label),content)};
  return h("div",{className:"overlay",onClick:props.onClose},
    h("div",{className:"card",style:{borderRadius:20,width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto"},onClick:function(e){e.stopPropagation()}},
      h("div",{style:{padding:"18px 24px",borderBottom:"1px solid var(--bd)"}},"Settings"),
      h("div",{style:{padding:"18px 24px",display:"flex",flexDirection:"column",gap:18}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("span",{style:{fontWeight:600,fontSize:14}},"Dark Mode"),
          h("button",{onClick:props.onToggleDark,style:{width:44,height:24,borderRadius:12,border:"none",background:props.dark?"#10b981":"#d1d5db",cursor:"pointer",position:"relative"}},
            h("span",{style:{position:"absolute",top:2,left:props.dark?22:2,width:20,height:20,background:"#fff",borderRadius:"50%",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}})
          )
        ),
        row("Anthropic API Key",h("div",null,
          h("p",{style:{color:"var(--tx3)",fontSize:12,marginBottom:6}},"For PDF metadata extraction and PEP-Web URL parsing."),
          h("div",{style:{display:"flex",gap:8}},
            h("input",{type:"password",value:ak,onChange:function(e){setAk(e.target.value)},placeholder:"sk-ant-\u2026",className:"inp",style:{flex:1}}),
            h("button",{onClick:saveKey,style:{padding:"0 14px",background:"#10b981",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}},"Save")
          )
        )),
        row("Data Backup",h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:exportData,className:"inp",style:{flex:1,cursor:"pointer",textAlign:"center"}},"Export JSON"),
          h("button",{onClick:function(){fr.current&&fr.current.click()},className:"inp",style:{flex:1,cursor:"pointer",textAlign:"center"}},"Import JSON"),
          h("input",{ref:fr,type:"file",accept:".json",style:{display:"none"},onChange:function(e){if(e.target.files[0])importData(e.target.files[0])}})
        )),
        row("Change Password",h("div",null,
          h("div",{style:{display:"flex",gap:8}},
            h("input",{type:"password",value:np,onChange:function(e){setNp(e.target.value)},placeholder:"New password",className:"inp",style:{flex:1}}),
            h("button",{onClick:chPass,style:{padding:"0 14px",background:"#10b981",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}},"Update")
          ),
          ok&&h("p",{style:{color:"#10b981",fontSize:12,marginTop:4}},"Password updated.")
        ))
      ),
      h("div",{style:{padding:"12px 24px",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"flex-end"}},
        h("button",{onClick:props.onClose,className:"inp",style:{width:"auto",padding:"6px 16px",cursor:"pointer"}},"Close")
      )
    )
  );
}

// ── PDF Reader ─────────────────────────────────────────────────
function PdfReader(props){
  var _pages=useState([]),pages=_pages[0],setPages=_pages[1];
  var _num=useState(0),numPages=_num[0],setNumPages=_num[1];
  var _hl=useState(props.entry.highlights||[]),hl=_hl[0],setHl=_hl[1];
  var _ac=useState("yellow"),ac=_ac[0],setAc=_ac[1];
  var _sel=useState(null),sel=_sel[0],setSel=_sel[1];
  var _tp=useState(null),tp=_tp[0],setTp=_tp[1];
  var _load=useState(false),load=_load[0],setLoad=_load[1];
  var _zoom=useState(1.4),zoom=_zoom[0],setZoom=_zoom[1];
  var crefs=useRef({}),rtasks=useRef({}),cref=useRef();

  useEffect(function(){
    if(!props.pdfData)return;
    setLoad(true);
    var bytes=Uint8Array.from(atob(props.pdfData),function(c){return c.charCodeAt(0)});
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    pdfjsLib.getDocument({data:bytes}).promise.then(function(pdf){
      setNumPages(pdf.numPages);
      var ps=[];for(var i=1;i<=Math.min(pdf.numPages,60);i++)ps.push(pdf.getPage(i));
      Promise.all(ps).then(function(p){setPages(p);setLoad(false)});
    }).catch(function(){setLoad(false)});
  },[props.pdfData]);

  useEffect(function(){
    pages.forEach(function(page,idx){
      var pn=idx+1,canvas=crefs.current[pn];if(!canvas)return;
      if(rtasks.current[pn])rtasks.current[pn].cancel();
      var vp=page.getViewport({scale:zoom});
      canvas.height=vp.height;canvas.width=vp.width;
      var task=page.render({canvasContext:canvas.getContext("2d"),viewport:vp});
      rtasks.current[pn]=task;task.promise.catch(function(){});
    });
  },[pages,zoom]);

  function onUp(pn){
    var s=window.getSelection();if(!s||s.isCollapsed){setSel(null);setTp(null);return}
    var txt=s.toString().trim();if(!txt||txt.length<3)return;
    var rect=s.getRangeAt(0).getBoundingClientRect();
    var cr=cref.current?cref.current.getBoundingClientRect():{left:0,top:0};
    setSel({text:txt,pn:pn});setTp({x:rect.left-cr.left+rect.width/2,y:rect.top-cr.top-8});
  }
  function applyHl(){
    if(!sel)return;
    setHl(function(h2){return h2.concat([{id:crypto.randomUUID(),text:sel.text,pn:sel.pn,color:ac}])});
    setSel(null);setTp(null);window.getSelection()&&window.getSelection().removeAllRanges();
  }
  function pullQ(){
    if(!sel)return;
    props.onAddQuote({id:crypto.randomUUID(),text:sel.text,page:"p. "+sel.pn,color:ac});
    applyHl();
  }

  if(!props.pdfData)return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}},
    h("div",{style:{fontSize:40,marginBottom:12}},"📄"),
    h("p",{style:{fontWeight:600,marginBottom:6}},"No PDF uploaded"),
    h("p",{style:{color:"var(--tx3)",fontSize:13,marginBottom:20}},"Upload the full-text PDF to read, highlight, and pull quotes"),
    h("label",{style:{padding:"10px 20px",background:"#10b981",color:"#fff",borderRadius:10,cursor:"pointer",fontWeight:600}},"Upload PDF",
      h("input",{type:"file",accept:"application/pdf",style:{display:"none"},onChange:function(e){
        var f=e.target.files[0];if(!f)return;
        if(f.size>5*1024*1024){alert("Max 5MB");return}
        var r=new FileReader();r.onload=function(){props.onUploadPdf(r.result.split(",")[1])};r.readAsDataURL(f);
      }})
    )
  );

  var tbtn={padding:"2px 8px",border:"1px solid var(--bd2)",background:"var(--bg3)",borderRadius:6,cursor:"pointer"};
  return h("div",{style:{display:"flex",flexDirection:"column",height:"100%"},ref:cref},
    h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderBottom:"1px solid var(--bd)",background:"var(--bg2)",flexShrink:0,flexWrap:"wrap"}},
      h("span",{style:{fontSize:12,color:"var(--tx3)"}},"Highlight:"),
      HLC.map(function(c){return h("button",{key:c.id,onClick:function(){setAc(c.id)},style:{width:18,height:18,borderRadius:"50%",border:"2px solid "+(ac===c.id?c.bd:"transparent"),background:c.bg,cursor:"pointer"}})}),
      h("span",{style:{borderLeft:"1px solid var(--bd2)",margin:"0 4px",height:16}}),
      h("span",{style:{fontSize:12,color:"var(--tx3)"}},"Zoom:"),
      h("button",{onClick:function(){setZoom(function(z){return Math.max(.5,z-.2)})},style:tbtn},"−"),
      h("span",{style:{fontSize:12,minWidth:36,textAlign:"center"}},Math.round(zoom*100)+"%"),
      h("button",{onClick:function(){setZoom(function(z){return Math.min(3,z+.2)})},style:tbtn},"+"),
      h("span",{style:{fontSize:12,color:"var(--tx3)",marginLeft:8}},numPages+" pages"),
      h("label",{style:{marginLeft:"auto",fontSize:12,padding:"4px 8px",border:"1px solid var(--bd2)",borderRadius:6,cursor:"pointer",color:"var(--tx2)"}},"Replace PDF",
        h("input",{type:"file",accept:"application/pdf",style:{display:"none"},onChange:function(e){
          var f=e.target.files[0];if(!f)return;
          if(f.size>5*1024*1024){alert("Max 5MB");return}
          var r=new FileReader();r.onload=function(){props.onUploadPdf(r.result.split(",")[1])};r.readAsDataURL(f);
        }})
      )
    ),
    hl.length>0&&h("div",{style:{padding:"8px 12px",borderBottom:"1px solid var(--bd)",background:"var(--bg3)",maxHeight:112,overflowY:"auto",flexShrink:0}},
      h("p",{style:{fontSize:11,fontWeight:600,color:"var(--tx3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}},"Highlights"),
      hl.map(function(item){var col=getHlc(item.color);return h("div",{key:item.id,style:{display:"flex",alignItems:"flex-start",gap:6,marginBottom:2}},
        h("span",{style:{width:8,height:8,borderRadius:"50%",background:col.bd,marginTop:4,flexShrink:0}}),
        h("span",{style:{fontSize:12,flex:1,color:"var(--tx2)"}},"\u201c"+item.text.slice(0,100)+(item.text.length>100?"\u2026":"")+"\u201d ",h("span",{style:{color:"var(--tx3)"}},"(p."+item.pn+")")),
        h("button",{onClick:function(){setHl(function(h2){return h2.filter(function(x){return x.id!==item.id})})},style:{fontSize:12,color:"#ef4444",background:"none",border:"none",cursor:"pointer"}},"×")
      )})
    ),
    h("div",{style:{flex:1,overflowY:"auto",background:"var(--bg3)",padding:16,display:"flex",flexDirection:"column",gap:16}},
      load&&h("div",{style:{textAlign:"center",padding:40,color:"var(--tx3)"}},"Rendering PDF\u2026"),
      pages.map(function(_pg,idx){
        var pn=idx+1,phl=hl.filter(function(x){return x.pn===pn});

    quickAdd&&h(QuickAdd,{projectId:activeProjectId,projects:projects,onSave:saveEntry,onCancel:function(){setQuickAdd(false)}}),
    editing&&h(EntryForm,{entry:editing,project:activeProject,onSave:saveEntry,onCancel:function(){setEditing(null)}}),
    editProj&&h(ProjModal,{project:editProj,onSave:saveProject,onCancel:function(){setEditProj(null)}}),
    showDel&&h("div",{className:"overlay",onClick:function(){setShowDel(null)}},
      h("div",{className:"card",style:{borderRadius:20,width:"100%",maxWidth:360,padding:28},onClick:function(e){e.stopPropagation()}},
        h("h3",{style:{fontSize:18,marginBottom:8}},"Delete project?"),
        h("p",{style:{fontSize:13,color:"var(--tx2)",marginBottom:20}},"This will permanently delete the project and all "+entries.filter(function(e){return e.projectId===showDel}).length+" sources in it."),
        h("div",{style:{display:"flex",gap:10,justifyContent:"flex-end"}},
          h("button",{onClick:function(){setShowDel(null)},className:"inp",style:{width:"auto",padding:"6px 16px",cursor:"pointer"}},"Cancel"),
          h("button",{onClick:function(){deleteProject(showDel)},style:{padding:"8px 18px",background:"#ef4444",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}},"Delete")
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>
</body>
</html>
