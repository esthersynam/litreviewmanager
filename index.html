<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lit Review Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
<style>
  :root {
    --bg: #fafaf9; --bg2: #ffffff; --bg3: #f5f5f4;
    --border: #e7e5e4; --border2: #d6d3d1;
    --text: #1c1917; --text2: #57534e; --text3: #a8a29e;
    --sidebar: #ffffff; --sidebar-border: #f5f5f4;
    --card: #ffffff; --card-border: #e7e5e4;
    --input-bg: #ffffff; --input-border: #e7e5e4;
    --active-nav: #1c1917; --active-nav-text: #ffffff;
  }
  .dark {
    --bg: #0c0a09; --bg2: #1c1917; --bg3: #292524;
    --border: #292524; --border2: #44403c;
    --text: #fafaf9; --text2: #a8a29e; --text3: #57534e;
    --sidebar: #111110; --sidebar-border: #1c1917;
    --card: #1c1917; --card-border: #292524;
    --input-bg: #1c1917; --input-border: #292524;
    --active-nav: #fafaf9; --active-nav-text: #1c1917;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; }
  input, textarea, select, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .card { background: var(--card); border: 1px solid var(--card-border); }
  .input { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); }
  .input:focus { outline: none; box-shadow: 0 0 0 2px rgba(16,185,129,0.3); }
  .sidebar { background: var(--sidebar); border-right: 1px solid var(--sidebar-border); }
  .nav-btn { color: var(--text2); }
  .nav-btn:hover { background: var(--bg3); }
  .nav-btn.active { background: var(--active-nav); color: var(--active-nav-text); }
  .modal-bg { background: rgba(0,0,0,0.5); }
  .modal { background: var(--card); border: 1px solid var(--card-border); }
  .divider { border-color: var(--border); }
  .text-muted { color: var(--text2); }
  .text-faint { color: var(--text3); }
  .section-label { color: var(--text3); font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = "psych-lit-review-v6";
const PDF_PREFIX = "psych-pdf-v6-";
const PASS_KEY = "lit-review-pass";
const SETTINGS_KEY = "lit-review-settings";

const PAPER_SECTIONS = ["","Introduction","Background","Literature Review","Discussion","Conclusion","Methods","Appendix"];
const STATUSES = ["to read","to annotate","to cite"];
const STATUS_STYLES = {
  "to read":     { badge:"bg-gray-100 text-gray-500 border border-gray-200",     btn:"border-gray-200 text-gray-500 hover:bg-gray-50" },
  "to annotate": { badge:"bg-yellow-50 text-yellow-700 border border-yellow-200", btn:"border-yellow-200 text-yellow-600 hover:bg-yellow-50" },
  "to cite":     { badge:"bg-green-50 text-green-700 border border-green-200",   btn:"border-green-200 text-green-600 hover:bg-green-50" },
};
const IMPORTANCE = [
  { level:1, label:"Core",       dot:"bg-violet-600", ring:"ring-violet-400", badge:"bg-violet-100 text-violet-700 border border-violet-300" },
  { level:2, label:"Major",      dot:"bg-sky-500",    ring:"ring-sky-400",    badge:"bg-sky-50 text-sky-700 border border-sky-200" },
  { level:3, label:"Supporting", dot:"bg-teal-400",   ring:"ring-teal-300",   badge:"bg-teal-50 text-teal-700 border border-teal-200" },
  { level:4, label:"Background", dot:"bg-gray-400",   ring:"ring-gray-300",   badge:"bg-gray-100 text-gray-500 border border-gray-200" },
  { level:5, label:"Peripheral", dot:"bg-gray-200",   ring:"ring-gray-200",   badge:"bg-gray-50 text-gray-400 border border-gray-100" },
];
const HIGHLIGHT_COLORS = [
  { id:"yellow", label:"Yellow", bg:"rgba(253,224,71,0.4)",  border:"#ca8a04" },
  { id:"green",  label:"Green",  bg:"rgba(134,239,172,0.4)", border:"#16a34a" },
  { id:"blue",   label:"Blue",   bg:"rgba(147,197,253,0.4)", border:"#2563eb" },
  { id:"pink",   label:"Pink",   bg:"rgba(249,168,212,0.4)", border:"#db2777" },
];

// ── Storage helpers (localStorage) ────────────────────────────
const ls = {
  get: (k) => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch { alert("Storage full — try removing some PDFs."); } },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
};

// ── Data helpers ───────────────────────────────────────────────
const emptyProject = () => ({ id: crypto.randomUUID(), name:"", description:"", customThemes:[], outline:[], createdAt: Date.now() });
const emptyEntry = () => ({
  id: crypto.randomUUID(), projectId: null,
  author:"", year:"", title:"", journal:"", volume:"", issue:"", pages:"", doi:"",
  sourceType:"article", themes:[], annotation:"", quotes:[], memo:"", paperSection:"",
  status:"to read", importance:3, deleted:false, archived:false, highlights:[], createdAt: Date.now(),
});
const emptyNode = () => ({ id: crypto.randomUUID(), text:"", children:[], citations:[] });

function formatApa7(e) {
  if (!e.author && !e.title) return "";
  const a = e.author ? e.author + (e.author.endsWith(".") ? "" : ".") : "";
  const y = e.year ? ` (${e.year}).` : "";
  const t = e.title ? ` ${e.title}${e.title.endsWith(".") ? "" : "."}` : "";
  if (e.sourceType === "book") return `${a}${y}${t}${e.journal ? ` ${e.journal}.` : ""}`;
  if (e.sourceType === "chapter") return `${a}${y}${t}${e.journal ? ` In ${e.journal}` : ""}${e.pages ? ` (pp. ${e.pages}).` : "."}`;
  return `${a}${y}${t}${e.journal ? ` ${e.journal}` : ""}${e.volume ? `, ${e.volume}` : ""}${e.issue ? `(${e.issue})` : ""}${e.pages ? `, ${e.pages}` : ""}.${e.doi ? ` ${e.doi}` : ""}`;
}

function ApaRef({ e, className="" }) {
  const ref = formatApa7(e); if (!ref) return null;
  const target = e.sourceType === "book" ? e.title : e.journal;
  if (target && ref.includes(target)) {
    const i = ref.indexOf(target);
    return <span className={`text-sm leading-relaxed ${className}`} style={{color:"var(--text)"}}>{ref.slice(0,i)}<em>{target}</em>{ref.slice(i+target.length)}</span>;
  }
  return <span className={`text-sm leading-relaxed ${className}`} style={{color:"var(--text)"}}>{ref}</span>;
}

function Badge({ label, colorClass, onRemove }) {
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${colorClass}`}>
      {label}{onRemove && <button onClick={onRemove} className="hover:opacity-60 ml-0.5 leading-none">×</button>}
    </span>
  );
}

// ── Password gate ──────────────────────────────────────────────
function PasswordGate({ onUnlock }) {
  const [input, setInput] = useState("");
  const [error, setError] = useState(false);
  const stored = ls.get(PASS_KEY);
  const [setting, setSetting] = useState(!stored);

  const submit = () => {
    if (setting) { if (input.length < 3) { setError(true); return; } ls.set(PASS_KEY, input); onUnlock(); }
    else { if (input === stored) onUnlock(); else setError(true); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center" style={{background:"var(--bg)"}}>
      <div className="card rounded-2xl shadow-xl p-8 w-full max-w-sm">
        <h1 className="font-serif text-2xl mb-1" style={{color:"var(--text)"}}>Lit Review</h1>
        <p className="text-sm mb-6 text-muted">{setting ? "Set a password to protect your research" : "Enter your password to continue"}</p>
        <input type="password" value={input} onChange={e=>{setInput(e.target.value);setError(false);}} onKeyDown={e=>e.key==="Enter"&&submit()}
          placeholder={setting ? "Choose a password" : "Password"} autoFocus
          className={`input w-full rounded-xl px-4 py-2.5 text-sm mb-3 ${error ? "border-red-400" : ""}`} />
        {error && <p className="text-xs text-red-500 mb-3">{setting ? "Password must be at least 3 characters" : "Incorrect password"}</p>}
        <button onClick={submit} className="w-full py-2.5 bg-green-600 text-white rounded-xl text-sm font-medium hover:bg-green-700">
          {setting ? "Set Password & Enter" : "Unlock"}
        </button>
        {!setting && <p className="text-xs text-center mt-3 text-faint">Forgot password? Clear your browser's localStorage for this site.</p>}
      </div>
    </div>
  );
}

// ── Settings Modal ─────────────────────────────────────────────
function SettingsModal({ onClose, dark, onToggleDark, entries, projects }) {
  const [apiKey, setApiKey] = useState(() => { const s = ls.get(SETTINGS_KEY); return s ? JSON.parse(s).apiKey || "" : ""; });
  const [newPass, setNewPass] = useState("");
  const [passSaved, setPassSaved] = useState(false);

  const saveApiKey = () => { const s = ls.get(SETTINGS_KEY); const cur = s ? JSON.parse(s) : {}; ls.set(SETTINGS_KEY, JSON.stringify({...cur, apiKey})); };
  const changePass = () => { if (newPass.length >= 3) { ls.set(PASS_KEY, newPass); setPassSaved(true); setNewPass(""); } };

  const exportData = () => {
    const data = { projects, entries, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `lit-review-backup-${Date.now()}.json`; a.click();
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.projects && data.entries) {
          ls.set(STORAGE_KEY, JSON.stringify({ projects: data.projects, entries: data.entries }));
          alert("Import successful. Reloading…"); window.location.reload();
        } else alert("Invalid backup file.");
      } catch { alert("Could not read file."); }
    };
    reader.readAsText(file);
  };

  const fileRef = useRef();

  return (
    <div className="fixed inset-0 modal-bg z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="modal rounded-2xl shadow-2xl w-full max-w-md" onClick={e=>e.stopPropagation()}>
        <div className="px-7 py-5 border-b divider"><h2 className="font-serif text-xl" style={{color:"var(--text)"}}>Settings</h2></div>
        <div className="px-7 py-5 space-y-6">

          {/* Dark mode */}
          <div className="flex items-center justify-between">
            <div><p className="text-sm font-medium" style={{color:"var(--text)"}}>Dark Mode</p></div>
            <button onClick={onToggleDark} className={`relative w-11 h-6 rounded-full transition-colors ${dark ? "bg-green-600" : "bg-gray-300"}`}>
              <span className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${dark ? "translate-x-5" : ""}`} />
            </button>
          </div>

          {/* API key */}
          <div>
            <p className="text-sm font-medium mb-1" style={{color:"var(--text)"}}>Anthropic API Key</p>
            <p className="text-xs mb-2 text-muted">Used for PDF metadata extraction and PEP-Web URL parsing. Get a key at console.anthropic.com.</p>
            <div className="flex gap-2">
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-…"
                className="input flex-1 rounded-lg px-3 py-2 text-sm" />
              <button onClick={saveApiKey} className="px-3 py-2 bg-green-600 text-white rounded-lg text-xs hover:bg-green-700">Save</button>
            </div>
          </div>

          {/* Data backup */}
          <div>
            <p className="text-sm font-medium mb-1" style={{color:"var(--text)"}}>Data Backup</p>
            <p className="text-xs mb-2 text-muted">Export all projects and entries as a JSON file. Import to restore or migrate to another device.</p>
            <div className="flex gap-2">
              <button onClick={exportData} className="flex-1 py-2 border rounded-xl text-xs hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Export JSON</button>
              <button onClick={()=>fileRef.current?.click()} className="flex-1 py-2 border rounded-xl text-xs hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Import JSON</button>
              <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={e=>e.target.files[0]&&importData(e.target.files[0])} />
            </div>
          </div>

          {/* Change password */}
          <div>
            <p className="text-sm font-medium mb-1" style={{color:"var(--text)"}}>Change Password</p>
            <div className="flex gap-2">
              <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="New password"
                className="input flex-1 rounded-lg px-3 py-2 text-sm" />
              <button onClick={changePass} className="px-3 py-2 bg-green-600 text-white rounded-lg text-xs hover:bg-green-700">Update</button>
            </div>
            {passSaved && <p className="text-xs text-green-600 mt-1">Password updated.</p>}
          </div>
        </div>
        <div className="px-7 py-4 border-t divider flex justify-end">
          <button onClick={onClose} className="px-4 py-2 rounded-lg text-sm border hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ── PDF Reader ─────────────────────────────────────────────────
function PdfReader({ entry, pdfData, onAddQuote, onUploadPdf }) {
  const containerRef = useRef();
  const [pages, setPages] = useState([]);
  const [numPages, setNumPages] = useState(0);
  const [highlights, setHighlights] = useState(entry.highlights || []);
  const [activeColor, setActiveColor] = useState("yellow");
  const [selection, setSelection] = useState(null);
  const [tooltipPos, setTooltipPos] = useState(null);
  const [loading, setLoading] = useState(false);
  const canvasRefs = useRef({});
  const renderTasks = useRef({});

  useEffect(() => {
    if (!pdfData) return;
    setLoading(true);
    const bytes = Uint8Array.from(atob(pdfData), c => c.charCodeAt(0));
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    pdfjsLib.getDocument({ data: bytes }).promise.then(pdf => {
      setNumPages(pdf.numPages);
      const ps = [];
      for (let i = 1; i <= Math.min(pdf.numPages, 60); i++) ps.push(pdf.getPage(i));
      Promise.all(ps).then(p => { setPages(p); setLoading(false); });
    }).catch(() => setLoading(false));
  }, [pdfData]);

  useEffect(() => {
    pages.forEach((page, idx) => {
      const pn = idx + 1;
      const canvas = canvasRefs.current[pn]; if (!canvas) return;
      if (renderTasks.current[pn]) renderTasks.current[pn].cancel();
      const vp = page.getViewport({ scale: 1.4 });
      canvas.height = vp.height; canvas.width = vp.width;
      const task = page.render({ canvasContext: canvas.getContext("2d"), viewport: vp });
      renderTasks.current[pn] = task;
      task.promise.catch(() => {});
    });
  }, [pages]);

  const handleMouseUp = useCallback((pageNum) => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) { setSelection(null); setTooltipPos(null); return; }
    const text = sel.toString().trim();
    if (!text || text.length < 3) return;
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    const cr = containerRef.current?.getBoundingClientRect() || { left:0, top:0 };
    setSelection({ text, pageNum });
    setTooltipPos({ x: rect.left - cr.left + rect.width / 2, y: rect.top - cr.top - 8 });
  }, []);

  const applyHighlight = () => {
    if (!selection) return;
    const h = { id: crypto.randomUUID(), text: selection.text, pageNum: selection.pageNum, color: activeColor };
    setHighlights(hs => [...hs, h]);
    setSelection(null); setTooltipPos(null);
    window.getSelection()?.removeAllRanges();
  };

  const pullQuote = () => {
    if (!selection) return;
    onAddQuote({ id: crypto.randomUUID(), text: selection.text, page: `p. ${selection.pageNum}`, color: activeColor });
    applyHighlight();
  };

  if (!pdfData) return (
    <div className="flex flex-col items-center justify-center h-full p-8 text-center">
      <p className="text-4xl mb-4">📄</p>
      <p className="text-sm font-medium mb-2" style={{color:"var(--text)"}}>No PDF uploaded</p>
      <p className="text-xs mb-5 text-muted">Upload the full-text PDF to read, highlight, and pull quotes</p>
      <label className="cursor-pointer px-4 py-2.5 bg-green-600 text-white rounded-xl text-sm font-medium hover:bg-green-700">
        Upload PDF
        <input type="file" accept="application/pdf" className="hidden" onChange={e => {
          const f = e.target.files[0]; if (!f) return;
          if (f.size > 5 * 1024 * 1024) { alert("PDF too large (max 5MB)."); return; }
          const r = new FileReader(); r.onload = () => onUploadPdf(r.result.split(",")[1]); r.readAsDataURL(f);
        }} />
      </label>
    </div>
  );

  return (
    <div className="flex flex-col h-full" ref={containerRef}>
      {/* Toolbar */}
      <div className="flex items-center gap-2 px-4 py-2 border-b divider flex-wrap shrink-0" style={{background:"var(--bg2)"}}>
        <span className="text-xs text-faint mr-1">Highlight:</span>
        {HIGHLIGHT_COLORS.map(c => (
          <button key={c.id} onClick={() => setActiveColor(c.id)}
            className={`w-5 h-5 rounded-full border-2 transition-all ${activeColor===c.id?"scale-125":"border-transparent hover:scale-110"}`}
            style={{ background: c.bg, borderColor: activeColor===c.id ? c.border : "transparent" }} />
        ))}
        <span className="text-xs text-faint mx-1">·</span>
        <span className="text-xs text-faint">{numPages} pages</span>
        <label className="ml-auto cursor-pointer text-xs px-2 py-1 rounded border hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>
          Replace PDF
          <input type="file" accept="application/pdf" className="hidden" onChange={e => {
            const f = e.target.files[0]; if (!f) return;
            if (f.size > 5 * 1024 * 1024) { alert("PDF too large (max 5MB)."); return; }
            const r = new FileReader(); r.onload = () => onUploadPdf(r.result.split(",")[1]); r.readAsDataURL(f);
          }} />
        </label>
      </div>
      {/* Highlights log */}
      {highlights.length > 0 && (
        <div className="px-4 py-2 border-b divider shrink-0 max-h-28 overflow-y-auto" style={{background:"var(--bg3)"}}>
          <p className="section-label mb-1">Highlights</p>
          <div className="space-y-1">
            {highlights.map(h => {
              const col = HIGHLIGHT_COLORS.find(c=>c.id===h.color)||HIGHLIGHT_COLORS[0];
              return (
                <div key={h.id} className="flex items-start gap-2 group">
                  <span className="w-2 h-2 rounded-full mt-1 shrink-0" style={{background:col.border}} />
                  <span className="text-xs flex-1 leading-relaxed" style={{color:"var(--text2)"}}>"{h.text.slice(0,100)}{h.text.length>100?"…":""}" <span className="text-faint">(p. {h.pageNum})</span></span>
                  <button onClick={()=>setHighlights(hs=>hs.filter(x=>x.id!==h.id))} className="text-xs opacity-0 group-hover:opacity-100 text-red-400">×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {/* Pages */}
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4" style={{background:"var(--bg3)"}}>
        {loading && <div className="flex items-center justify-center py-16 text-sm text-faint">Rendering PDF…</div>}
        {pages.map((page, idx) => {
          const pn = idx + 1;
          const phl = highlights.filter(h=>h.pageNum===pn);
          return (
            <div key={pn} className="relative mx-auto shadow-md" style={{width:"fit-content"}} onMouseUp={()=>handleMouseUp(pn)}>
              <canvas ref={el=>{if(el)canvasRefs.current[pn]=el;}} style={{display:"block"}} />
              {phl.map(h=>{
                const col=HIGHLIGHT_COLORS.find(c=>c.id===h.color)||HIGHLIGHT_COLORS[0];
                return <div key={h.id} className="absolute left-0 top-0 h-full rounded-l" style={{width:"4px",background:col.border,opacity:0.7}} title={h.text} />;
              })}
              <div className="absolute bottom-1 right-2 text-xs bg-white bg-opacity-70 px-1.5 py-0.5 rounded" style={{color:"#666"}}>{pn}</div>
            </div>
          );
        })}
      </div>
      {/* Selection tooltip */}
      {tooltipPos && selection && (
        <div className="fixed z-50 flex gap-1 rounded-xl shadow-xl px-2 py-1.5" style={{background:"#1c1917",left:Math.max(8,tooltipPos.x-100),top:Math.max(8,tooltipPos.y-48),transform:"translateY(-100%)"}}>
          {HIGHLIGHT_COLORS.map(c=>(
            <button key={c.id} onClick={()=>setActiveColor(c.id)}
              className={`w-4 h-4 rounded-full border transition-all ${activeColor===c.id?"scale-125 ring-1 ring-white":""}`}
              style={{background:c.bg,borderColor:c.border}} />
          ))}
          <button onClick={applyHighlight} className="text-xs text-white px-2 py-0.5 rounded-lg ml-1 hover:opacity-80" style={{background:"#44403c"}}>Highlight</button>
          <button onClick={pullQuote} className="text-xs text-white px-2 py-0.5 rounded-lg hover:opacity-80" style={{background:"#16a34a"}}>Pull Quote</button>
        </div>
      )}
    </div>
  );
}

// ── Annotation Panel ───────────────────────────────────────────
function AnnotationPanel({ entry, onUpdate }) {
  const [annotation, setAnnotation] = useState(entry.annotation||"");
  const [memo, setMemo] = useState(entry.memo||"");
  const [dirty, setDirty] = useState(false);
  useEffect(()=>{setAnnotation(entry.annotation||"");setMemo(entry.memo||"");setDirty(false);},[entry.id]);
  const save = () => { onUpdate({...entry,annotation,memo}); setDirty(false); };
  const removeQuote = id => onUpdate({...entry,quotes:(entry.quotes||[]).filter(q=>q.id!==id)});
  return (
    <div className="flex flex-col h-full" style={{background:"var(--bg2)"}}>
      <div className="px-5 py-3 border-b divider shrink-0">
        <p className="font-serif text-sm font-semibold truncate" style={{color:"var(--text)"}}>{entry.author}{entry.year?` (${entry.year})`:""}</p>

  );
}

    <div className="fixed inset-0 z-40 flex flex-col" style={{background:"var(--bg)"}}>

}

// ── Quick Add ──────────────────────────────────────────────────
function QuickAddModal({ projectId, projects, onSave, onCancel }) {
  const [mode, setMode] = useState("doi");
  const [url, setUrl] = useState("");
  const [loading, setLoading] = useState(false);
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState("");
  const fileRef = useRef();

  const getApiKey = () => { const s=ls.get(SETTINGS_KEY); return s?JSON.parse(s).apiKey||"":""; };

  const handleDoi = async () => {
    if (!url.trim()) return;
    setLoading(true); setError("");
    // Try CrossRef first (free, no key)
    try {
      const doi = url.trim().replace(/^https?:\/\/(dx\.)?doi\.org\//,"");
      const res = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`);
      if (res.ok) {
        const d = await res.json(); const w = d.message;
        const authors = (w.author||[]).map(a=>`${a.family||""}, ${(a.given||"").charAt(0)}.`).join(", & ");
        const entry = { ...emptyEntry(), projectId,
          author: authors, year: String((w.published?.["date-parts"]?.[0]?.[0])||""),
          title: (w.title?.[0]||"").replace(/<[^>]*>/g,""),
          journal: w["container-title"]?.[0]||"",
          volume: w.volume||"", issue: w.issue||"",
          pages: (w.page||"").replace("-","–"),
          doi: `https://doi.org/${w.DOI||doi}`,
          sourceType: w.type?.includes("book")?"book":"article",
        };
        setParsed(entry); setLoading(false); return;
      }
    } catch {}
    // Fallback: Anthropic API
    const apiKey = getApiKey();
    if (apiKey) {
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST", headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:800,
            system:`Extract bibliographic metadata from a URL or DOI. Return ONLY valid JSON: author, year, title, journal, volume, issue, pages, doi, sourceType (article|book|chapter). Use "" for unknown. No markdown.`,
            messages:[{role:"user",content:`URL: ${url.trim()}`}] })
        });
        const data = await res.json();
        const text = data.content?.find(b=>b.type==="text")?.text||"";
        const meta = JSON.parse(text.replace(/```json|```/g,"").trim());
        setParsed({...emptyEntry(),...meta,projectId,doi:meta.doi||url.trim()});
        setLoading(false); return;
      } catch {}
    }
    setParsed({...emptyEntry(),projectId,doi:url.trim()});
    setError("Couldn't auto-parse. Add an Anthropic API key in Settings for better results, or fill in manually.");
    setLoading(false);
  };

  const handlePdf = async (file) => {
    if (!file) return;
    setLoading(true); setError("");
    const apiKey = getApiKey();
    const base64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    if (apiKey) {
      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST", headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:800,
            system:`Extract bibliographic metadata from this academic PDF. Return ONLY valid JSON: author (Last, F. format), year, title, journal, volume, issue, pages, doi, sourceType. No markdown.`,
            messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:"Extract metadata."}]}] })
        });
        const data = await response.json();
        const text = data.content?.find(b=>b.type==="text")?.text||"";
        const meta = JSON.parse(text.replace(/```json|```/g,"").trim());
        const entry = {...emptyEntry(),...meta,projectId};
        if (file.size <= 5*1024*1024) entry._pdfBase64 = base64;
        setParsed(entry); setLoading(false); return;
      } catch {}
    }
    setError("Add an Anthropic API key in Settings to extract PDF metadata automatically.");
    const entry = {...emptyEntry(),projectId};
    if (file.size <= 5*1024*1024) entry._pdfBase64 = base64;
    setParsed(entry);
    setLoading(false);
  };

  if (parsed) return <EntryForm entry={parsed} project={projects.find(p=>p.id===projectId)} onSave={onSave} onCancel={onCancel} />;

  return (
    <div className="fixed inset-0 modal-bg z-50 flex items-center justify-center p-4" onClick={onCancel}>
      <div className="modal rounded-2xl shadow-2xl w-full max-w-md" onClick={e=>e.stopPropagation()}>
        <div className="px-7 py-5 border-b divider">
          <h2 className="font-serif text-xl" style={{color:"var(--text)"}}>Add Source</h2>
          <p className="text-sm mt-0.5 text-muted">DOI (free) · PDF (API key) · Manual</p>
        </div>
        <div className="px-7 py-5 space-y-5">
          <div className="flex gap-2">
            {[["doi","DOI / URL"],["pdf","Upload PDF"],["manual","Manual"]].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setError("");}}
                className={`flex-1 py-2 rounded-lg text-xs border font-medium transition-all ${mode===m?"text-white border-transparent":"hover:opacity-80"}`}
                style={mode===m?{background:"var(--active-nav)",color:"var(--active-nav-text)"}:{borderColor:"var(--border)",color:"var(--text2)"}}>{l}</button>
            ))}
          </div>
          {mode==="doi"&&(<div className="space-y-3">
            <input value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleDoi()}
              placeholder="https://doi.org/10.xxx or PEP-Web URL" autoFocus
              className="input w-full rounded-lg px-3 py-2 text-sm" />
            {error&&<p className="text-xs text-yellow-700 bg-yellow-50 border border-yellow-100 rounded-lg px-3 py-2">{error}</p>}
            <button onClick={handleDoi} disabled={loading||!url.trim()} className="w-full py-2.5 bg-green-600 text-white rounded-xl text-sm font-medium hover:bg-green-700 disabled:opacity-40">
              {loading?"Looking up…":"Import"}
            </button>
            <p className="text-xs text-faint text-center">CrossRef DOI lookup is free · PEP-Web URLs require API key</p>
          </div>)}
          {mode==="pdf"&&(<div className="space-y-3">
            <div onClick={()=>fileRef.current?.click()} className="border-2 border-dashed rounded-xl p-8 text-center cursor-pointer hover:opacity-80 transition-all" style={{borderColor:"var(--border2)"}}>
              <p className="text-3xl mb-2">📄</p>
              <p className="text-sm font-medium" style={{color:"var(--text)"}}>Click to upload PDF</p>
              <p className="text-xs mt-1 text-faint">Metadata extraction requires API key · max 5MB</p>
              <input ref={fileRef} type="file" accept="application/pdf" className="hidden" onChange={e=>e.target.files[0]&&handlePdf(e.target.files[0])} />
            </div>
            {loading&&<p className="text-xs text-center text-faint animate-pulse">Extracting metadata…</p>}
            {error&&<p className="text-xs text-yellow-700 bg-yellow-50 border border-yellow-100 rounded-lg px-3 py-2">{error}</p>}
          </div>)}
          {mode==="manual"&&(<button onClick={()=>setParsed({...emptyEntry(),projectId})} className="w-full py-2.5 bg-green-600 text-white rounded-xl text-sm font-medium hover:bg-green-700">Open Entry Form</button>)}
        </div>
        <div className="px-7 py-4 border-t divider flex justify-end">
          <button onClick={onCancel} className="px-4 py-2 rounded-lg text-sm border hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

            {entry.journal&&<p className="text-xs italic mt-0.5 text-faint">{entry.journal}</p>}
          </div>
          <div className="flex items-center gap-1 shrink-0">
            <button onClick={()=>onOpenReader(entry)} title="Open reader" className="p-1.5 rounded-lg text-green-500 hover:bg-green-50 text-xs">📖</button>
            <button onClick={()=>setExpanded(e=>!e)} className="p-1.5 rounded-lg text-xs hover:opacity-80" style={{color:"var(--text3)"}}>{expanded?"▲":"▼"}</button>
            <button onClick={()=>onEdit(entry)} className="p-1.5 rounded-lg text-xs hover:opacity-80" style={{color:"var(--text3)"}}>✎</button>
          </div>
        </div>
        {expanded&&(
          <div className="mt-3 pt-3 border-t divider space-y-3">
            <div className="text-xs"><ApaRef e={entry} /></div>
            {(entry.quotes||[]).length>0&&<div className="space-y-2">{(entry.quotes||[]).map(q=>{
              const col=HIGHLIGHT_COLORS.find(c=>c.id===q.color)||HIGHLIGHT_COLORS[0];
              return <div key={q.id} className="rounded-lg px-3 py-2 text-sm italic border" style={{borderColor:col.border,background:col.bg,color:"var(--text)"}}>"{q.text}" <span className="text-xs not-italic font-medium" style={{color:"var(--text2)"}}>({q.page})</span></div>;
            })}</div>}
            {entry.annotation&&<p className="text-sm leading-relaxed whitespace-pre-wrap border-l-2 border-green-300 pl-3" style={{color:"var(--text2)"}}>{entry.annotation}</p>}
            {entry.memo&&<div className="rounded-lg px-3 py-2" style={{background:"var(--bg3)",border:"1px solid var(--border)"}}>
              <p className="section-label mb-1">Memo</p>
              <p className="text-sm whitespace-pre-wrap" style={{color:"var(--text2)"}}>{entry.memo}</p></div>}

            <div className="flex flex-wrap gap-2 pt-1">
              <button onClick={()=>onCycleStatus(entry.id)} className={`text-xs px-3 py-1.5 rounded-lg border ${STATUS_STYLES[next].btn}`}>→ Mark as "{next}"</button>
              <button onClick={()=>onSoftDelete(entry.id)} className="text-xs px-3 py-1.5 rounded-lg border border-red-100 text-red-400 hover:bg-red-50 ml-auto">Move to Trash</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Outline ────────────────────────────────────────────────────
function OutlineNode({ node, depth=0, entries, onUpdate, onDelete, onAddChild, citableSources }) {
  const [editing, setEditing] = useState(!node.text);
  const [showPicker, setShowPicker] = useState(false);
  const [text, setText] = useState(node.text);
  const inputRef = useRef();
  useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus();},[editing]);
  const commit = () => { onUpdate({...node,text}); setEditing(false); };
  const addCit = id => { if(!node.citations.includes(id))onUpdate({...node,citations:[...node.citations,id]}); setShowPicker(false); };
  const remCit = id => onUpdate({...node,citations:node.citations.filter(x=>x!==id)});
  return (
    <div className={`${depth>0?"ml-6 pl-3":"" } space-y-1`} style={depth>0?{borderLeft:"2px solid var(--border)"}:{}}>
      <div className="group flex items-start gap-2 py-1">
        <span className="text-xs mt-2 select-none text-faint">•</span>
        <div className="flex-1 min-w-0">
          {editing?(
            <div className="flex gap-2 items-start">
              <textarea ref={inputRef} value={text} onChange={e=>setText(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commit();}if(e.key==="Escape")setEditing(false);}}
                rows={2} placeholder="Add point…" className="input flex-1 rounded-lg px-3 py-1.5 text-sm resize-none" />
              <button onClick={commit} className="px-3 py-1.5 text-xs bg-green-600 text-white rounded-lg hover:bg-green-700 shrink-0">Save</button>
            </div>
          ):(
            <div>
              <span onClick={()=>setEditing(true)} className="text-sm leading-relaxed cursor-text whitespace-pre-wrap hover:opacity-80" style={{color:"var(--text)"}}>{node.text||<span className="italic text-faint">Click to edit</span>}</span>
              {node.citations.length>0&&(
                <div className="flex flex-wrap gap-1 mt-1">{node.citations.map(cId=>{
                  const e=entries.find(x=>x.id===cId); if(!e) return null;
                  const imp=IMPORTANCE.find(i=>i.level===(e.importance||3));
                  return <span key={cId} className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${imp.badge}`}>
                    <span className={`w-1.5 h-1.5 rounded-full ${imp.dot}`}></span>
                    {e.author?.split(",")[0]||"?"}{e.year?` (${e.year})`:""}
                    <button onClick={()=>remCit(cId)} className="hover:opacity-60 ml-0.5 leading-none">×</button>
                  </span>;
                })}</div>
              )}
            </div>
          )}
        </div>
        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 shrink-0 mt-1">
          <button onClick={()=>setShowPicker(p=>!p)} className="p-1 rounded hover:opacity-80 text-xs text-faint">⊕</button>
          <button onClick={()=>onAddChild(node.id)} className="p-1 rounded hover:opacity-80 text-xs text-faint">↳</button>
          <button onClick={()=>onDelete(node.id)} className="p-1 rounded hover:opacity-80 text-xs text-red-400">×</button>
        </div>
      </div>
      {showPicker&&(
        <div className="ml-6 mb-2 rounded-xl shadow-lg p-3 max-h-64 overflow-y-auto z-10" style={{background:"var(--bg2)",border:"1px solid var(--border)"}}>
          <p className="section-label mb-2">Attach a source</p>
          {citableSources.length===0&&<p className="text-xs italic text-faint">No annotated sources yet.</p>}
          <div className="space-y-1">{citableSources.map(e=>{
            const imp=IMPORTANCE.find(i=>i.level===(e.importance||3));
            const already=node.citations.includes(e.id);
            return <button key={e.id} onClick={()=>already?remCit(e.id):addCit(e.id)}
              className={`w-full text-left px-3 py-2 rounded-lg text-xs flex items-center gap-2 transition-all ${already?"bg-green-50 border border-green-200":"hover:opacity-80 border border-transparent"}`}
              style={already?{}:{background:"var(--bg3)"}}>
              <span className={`w-2 h-2 rounded-full shrink-0 ${imp.dot}`}></span>
              <span className="flex-1 truncate" style={{color:"var(--text)"}}><span className="font-medium">{e.author?.split(",")[0]||"?"}</span>{e.year?` (${e.year}) `:""}{e.title&&<span className="text-faint">— {e.title.slice(0,50)}{e.title.length>50?"…":""}</span>}</span>
              {already&&<span className="text-green-600 shrink-0">✓</span>}
            </button>;
          })}</div>
          <button onClick={()=>setShowPicker(false)} className="mt-2 text-xs hover:opacity-80 text-faint">Close</button>
        </div>
      )}
      {node.children.map(child=>(
        <OutlineNode key={child.id} node={child} depth={depth+1} entries={entries} citableSources={citableSources}
          onUpdate={u=>onUpdate({...node,children:node.children.map(c=>c.id===u.id?u:c)})}
          onDelete={id=>onUpdate({...node,children:node.children.filter(c=>c.id!==id)})}
          onAddChild={pid=>onUpdate({...node,children:node.children.map(c=>c.id===pid?{...c,children:[...c.children,emptyNode()]}:c)})}
        />
      ))}
    </div>
  );
}

function OutlineView({ project, entries, onUpdateProject }) {
  const outline = project.outline||[];
  const upd = (nodes,u) => nodes.map(n=>n.id===u.id?u:{...n,children:upd(n.children,u)});
  const del = (nodes,id) => nodes.filter(n=>n.id!==id).map(n=>({...n,children:del(n.children,id)}));
  const addTo = (nodes,pid) => nodes.map(n=>n.id===pid?{...n,children:[...n.children,emptyNode()]}:{...n,children:addTo(n.children,pid)});
  const set = fn => { const next=typeof fn==="function"?fn(outline):fn; onUpdateProject({...project,outline:next}); };
  const citable = entries.filter(e=>e.projectId===project.id&&!e.deleted&&e.status==="to annotate"&&e.annotation);
  const exportTxt = () => {
    const render = (node,d=0) => {
      const ind="  ".repeat(d);
      const cits=node.citations.map(cId=>{const e=entries.find(x=>x.id===cId);return e?`${e.author||"?"} (${e.year||"n.d."})`:null;}).filter(Boolean);
      let out=`${ind}• ${node.text}`; if(cits.length)out+=`  [${cits.join("; ")}]`;
      return [out,...node.children.map(c=>render(c,d+1))].join("\n");
    };
    const blob=new Blob([outline.map(n=>render(n)).join("\n")],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="outline.txt";a.click();
  };
  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div><h3 className="font-serif text-lg" style={{color:"var(--text)"}}>Essay Outline</h3>
          <p className="text-xs mt-0.5 text-faint">Click to edit · ⊕ attach citations · ↳ sub-point</p></div>
        <div className="flex gap-2">
          <button onClick={exportTxt} className="px-3 py-2 rounded-xl text-xs hover:opacity-80 border" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Export .txt</button>
          <button onClick={()=>set(o=>[...o,emptyNode()])} className="px-3 py-2 bg-green-600 text-white rounded-xl text-xs font-medium hover:bg-green-700">+ Add Point</button>
        </div>
      </div>
      {citable.length===0&&<div className="rounded-xl px-4 py-3 mb-4 text-xs text-yellow-700 bg-yellow-50 border border-yellow-100">Sources marked <strong>"to annotate"</strong> with a completed annotation will appear for citation attachment.</div>}
      {outline.length===0?(<div className="text-center py-16 text-faint"><p className="text-4xl mb-3">📝</p><p className="text-sm">No outline yet.</p></div>):(
        <div className="card rounded-xl p-5 space-y-1">
          {outline.map(node=>(
            <OutlineNode key={node.id} node={node} depth={0} entries={entries} citableSources={citable}
              onUpdate={u=>set(o=>upd(o,u))} onDelete={id=>set(o=>del(o,id))} onAddChild={pid=>set(o=>addTo(o,pid))} />
          ))}
          <div className="pt-2">
            <button onClick={()=>set(o=>[...o,emptyNode()])} className="text-xs w-full px-3 py-1.5 rounded-lg border border-dashed hover:opacity-80 text-center text-faint" style={{borderColor:"var(--border2)"}}>+ Add top-level point</button>
          </div>
        </div>
      )}
    </div>
  );
}

function exportDocx(bibEntries) {
  const rows=bibEntries.map(e=>{
    const ref=formatApa7(e); const imp=IMPORTANCE.find(i=>i.level===(e.importance||3));
    const tags=e.themes.length?`<p style="font-size:10pt;color:#555;margin:4pt 0 0 0">Tags: ${e.themes.join(", ")}</p>`:"";
    const qs=(e.quotes||[]).map(q=>`<p style="margin:4pt 0 0 12pt;font-size:11pt;font-style:italic;color:#444">"${q.text}" <span style="font-style:normal">(${q.page})</span></p>`).join("");
    const ann=e.annotation?`<p style="margin:6pt 0 0 0;font-size:12pt">${e.annotation.replace(/\n/g,"<br>")}</p>`:`<p style="margin:6pt 0 0 0;font-size:12pt;color:#999"><em>[No annotation]</em></p>`;
    return `<div style="margin-bottom:18pt;padding-bottom:14pt;border-bottom:1px solid #ddd"><p style="margin:0;text-indent:-0.5in;padding-left:0.5in;font-size:12pt">${ref}</p><p style="font-size:10pt;color:#555;margin:2pt 0 0 0">Importance: ${imp.label}</p>${tags}${qs}${ann}</div>`;
  }).join("\n");
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>@page{margin:1in}body{font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:2;color:#000}h1{font-size:14pt;text-align:center;margin-bottom:24pt}</style></head><body><h1>Annotated Bibliography</h1>${rows}</body></html>`;
  const blob=new Blob([html],{type:"application/msword"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="annotated_bibliography.doc";a.click();
}

// ── Trash ──────────────────────────────────────────────────────
function TrashView({ entries, projects, onRestore, onHardDelete, onEmptyTrash }) {
  const deleted=entries.filter(e=>e.deleted);
  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div><h3 className="font-serif text-lg" style={{color:"var(--text)"}}>Trash</h3>
          <p className="text-xs mt-0.5 text-faint">{deleted.length} deleted source{deleted.length!==1?"s":""} across all projects</p></div>
        {deleted.length>0&&<button onClick={onEmptyTrash} className="px-3 py-2 rounded-xl text-xs text-red-500 border border-red-200 hover:bg-red-50">Empty Trash</button>}
      </div>
      {deleted.length===0?(<div className="text-center py-16 text-faint"><p className="text-4xl mb-3">🗑️</p><p className="text-sm">Trash is empty.</p></div>):(
        <div className="space-y-3">{deleted.map(e=>{
          const proj=projects.find(p=>p.id===e.projectId);
          const imp=IMPORTANCE.find(i=>i.level===(e.importance||3));
          return (<div key={e.id} className="card rounded-xl px-5 py-4 opacity-70">
            <div className="flex items-start justify-between gap-3">
              <div className="flex-1 min-w-0">
                {proj&&<p className="text-xs mb-1 text-faint">Project: <span className="font-medium" style={{color:"var(--text2)"}}>{proj.name}</span></p>}
                <p className="font-medium text-sm" style={{color:"var(--text)"}}>{e.author} {e.year&&`(${e.year})`} — {e.title||<span className="italic text-faint">Untitled</span>}</p>
                <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium mt-1 ${imp.badge}`}><span className={`w-1.5 h-1.5 rounded-full ${imp.dot}`}></span>{imp.label}</span>
              </div>
              <div className="flex gap-2 shrink-0">
                <button onClick={()=>onRestore(e.id)} className="text-xs px-3 py-1.5 rounded-lg border hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Restore</button>
                <button onClick={()=>onHardDelete(e.id)} className="text-xs px-3 py-1.5 rounded-lg border border-red-100 text-red-400 hover:bg-red-50">Delete Forever</button>
              </div>
            </div>
          </div>);
        })}</div>
      )}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [dark, setDark] = useState(()=>ls.get("lit-review-dark")==="1");
  const [projects, setProjects] = useState([]);
  const [entries, setEntries] = useState([]);
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [globalView, setGlobalView] = useState(null);
  const [view, setView] = useState("active");
  const [quickAdd, setQuickAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [editingProject, setEditingProject] = useState(null);
  const [readerEntry, setReaderEntry] = useState(null);
  const [readerPdf, setReaderPdf] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [search, setSearch] = useState("");
  const [filterTag, setFilterTag] = useState("");
  const [filterSection, setFilterSection] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [filterImp, setFilterImp] = useState("");
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(()=>{
    const d=document.documentElement;
    if(dark){d.classList.add("dark");}else{d.classList.remove("dark");}
    ls.set("lit-review-dark",dark?"1":"0");
  },[dark]);

  useEffect(()=>{
    if(!unlocked) return;
    const raw=ls.get(STORAGE_KEY);
    if(raw){const s=JSON.parse(raw);setProjects(s.projects||[]);setEntries(s.entries||[]);}
    setLoaded(true);
  },[unlocked]);

  useEffect(()=>{
    if(!loaded) return;
    ls.set(STORAGE_KEY,JSON.stringify({projects,entries}));
  },[projects,entries,loaded]);

  const activeProject = projects.find(p=>p.id===activeProjectId)||null;
  const saveProject = form => { setProjects(ps=>ps.find(p=>p.id===form.id)?ps.map(p=>p.id===form.id?form:p):[...ps,form]); if(!activeProjectId)setActiveProjectId(form.id); setEditingProject(null); };
  const updateProject = form => setProjects(ps=>ps.map(p=>p.id===form.id?form:p));
  const deleteProject = id => { setProjects(ps=>ps.filter(p=>p.id!==id)); setEntries(es=>es.filter(e=>e.projectId!==id)); if(activeProjectId===id)setActiveProjectId(projects.find(p=>p.id!==id)?.id||null); setShowDeleteConfirm(null); };

  const saveEntry = (form) => {
    if(form._pdfBase64){ls.set(PDF_PREFIX+form.id,form._pdfBase64);delete form._pdfBase64;}
    setEntries(es=>es.find(e=>e.id===form.id)?es.map(e=>e.id===form.id?form:e):[...es,form]);
    if(activeProject&&form.themes){const nt=form.themes.filter(t=>!(activeProject.customThemes||[]).includes(t));if(nt.length)setProjects(ps=>ps.map(p=>p.id===activeProjectId?{...p,customThemes:[...(p.customThemes||[]),...nt]}:p));}
    setEditing(null); setQuickAdd(false);
  };

  const softDelete = id => setEntries(es=>es.map(e=>e.id===id?{...e,deleted:true}:e));
  const restore = id => setEntries(es=>es.map(e=>e.id===id?{...e,deleted:false}:e));
  const hardDelete = id => { ls.del(PDF_PREFIX+id); setEntries(es=>es.filter(e=>e.id!==id)); };
  const emptyTrash = () => { if(confirm("Permanently delete all trashed sources?")){ entries.filter(e=>e.deleted).forEach(e=>ls.del(PDF_PREFIX+e.id)); setEntries(es=>es.filter(e=>!e.deleted)); }};
  const cycleStatus = id => setEntries(es=>es.map(e=>e.id===id?{...e,status:STATUSES[(STATUSES.indexOf(e.status||"to read")+1)%STATUSES.length]}:e));
  const cycleImp = id => setEntries(es=>es.map(e=>e.id===id?{...e,importance:((e.importance||3)%5)+1}:e));

  useEffect(()=>{
    if(!readerEntry) return;
    const pdf=ls.get(PDF_PREFIX+readerEntry.id);
    setReaderPdf(pdf||null);
  },[readerEntry?.id]);

  const projectEntries = entries.filter(e=>e.projectId===activeProjectId&&!e.deleted);
  const allTags = activeProject?.customThemes||[];
  const filtered = projectEntries.filter(e=>{
    const mv=view==="archive"?e.archived:!e.archived;
    const ms=!search||[e.author,e.title,e.journal,e.annotation,e.memo].join(" ").toLowerCase().includes(search.toLowerCase());
    const mt=!filterTag||e.themes.includes(filterTag);
    const mse=!filterSection||e.paperSection===filterSection;
    const mst=!filterStatus||(e.status||"to read")===filterStatus;
    const mi=!filterImp||(e.importance||3)===Number(filterImp);
    return mv&&ms&&mt&&mse&&mst&&mi;
  });
  const bibEntries = projectEntries.filter(e=>e.status==="to annotate"&&!e.archived).sort((a,b)=>(a.author||"").localeCompare(b.author||""));
  const usedSections = [...new Set(projectEntries.filter(e=>e.paperSection).map(e=>e.paperSection))];
  const trashCount = entries.filter(e=>e.deleted).length;
  const TABS = ["active","bibliography","outline","archive"];

  if (!unlocked) return <PasswordGate onUnlock={()=>setUnlocked(true)} />;
  if (!loaded) return <div className="min-h-screen flex items-center justify-center text-faint" style={{background:"var(--bg)"}}>Loading…</div>;

  if (readerEntry) {
    const cur=entries.find(e=>e.id===readerEntry.id)||readerEntry;
    return <ReaderView entry={cur} entries={entries} setEntries={setEntries} pdfData={readerPdf}
      onUploadPdf={b64=>{ls.set(PDF_PREFIX+cur.id,b64);setReaderPdf(b64);}}
      onClose={()=>setReaderEntry(null)} />;
  }

  return (
    <div className="min-h-screen flex" style={{background:"var(--bg)"}}>
      {/* Sidebar */}
      <div className="w-56 shrink-0 sidebar flex flex-col min-h-screen sticky top-0 h-screen overflow-y-auto">
        <div className="px-4 pt-5 pb-3 border-b divider flex items-center justify-between">
          <div><h1 className="font-serif text-base font-semibold" style={{color:"var(--text)"}}>Lit Review</h1>
            <p className="text-xs text-faint">Manager</p></div>
          <button onClick={()=>setShowSettings(true)} className="p-1.5 rounded-lg hover:opacity-80 text-faint" title="Settings">⚙️</button>
        </div>
        <div className="px-3 py-3 flex-1">
          <div className="flex items-center justify-between mb-2">
            <p className="section-label">Projects</p>
            <button onClick={()=>setEditingProject(emptyProject())} className="text-xs text-green-600 hover:text-green-700 font-medium px-1.5 py-0.5 rounded hover:bg-green-50">+ New</button>
          </div>
          {!projects.length&&<p className="text-xs italic text-faint px-1 py-2">No projects yet.</p>}
          <div className="space-y-0.5">
            {projects.map(p=>{
              const cnt=entries.filter(e=>e.projectId===p.id&&!e.deleted&&!e.archived).length;
              const isActive=p.id===activeProjectId&&!globalView;
              return (<div key={p.id}>
                <button onClick={()=>{setActiveProjectId(p.id);setGlobalView(null);setView("active");setFilterTag("");setSearch("");setFilterStatus("");setFilterImp("");}}
                  className={`nav-btn w-full text-left px-3 py-2 rounded-lg text-sm transition-all ${isActive?"active":""}`}>
                  <span className="block truncate font-medium">{p.name}</span>
                  <span className="text-xs opacity-60">{cnt} source{cnt!==1?"s":""}</span>
                </button>
                {isActive&&<div className="flex gap-1 px-3 pb-1">
                  <button onClick={()=>setEditingProject({...p})} className="text-xs text-faint hover:opacity-80">edit</button>
                  <span className="text-xs text-faint">·</span>
                  <button onClick={()=>setShowDeleteConfirm(p.id)} className="text-xs text-red-400 hover:opacity-80">delete</button>
                </div>}
              </div>);
            })}
          </div>
        </div>
        {/* Importance filter */}
        <div className="px-4 py-3 border-t divider">
          <p className="section-label mb-2">Importance</p>
          <div className="space-y-1">{IMPORTANCE.map(imp=>(
            <button key={imp.level} onClick={()=>setFilterImp(f=>f===String(imp.level)?"":String(imp.level))}
              className={`flex items-center gap-2 w-full px-2 py-1 rounded-lg text-xs transition-all ${filterImp===String(imp.level)?imp.badge+" ring-1 "+imp.ring:"nav-btn"}`}>
              <span className={`w-2 h-2 rounded-full shrink-0 ${imp.dot}`}></span>{imp.label}
            </button>
          ))}</div>
        </div>
        {allTags.length>0&&!globalView&&(
          <div className="px-4 py-3 border-t divider">
            <p className="section-label mb-2">Tags</p>
            <div className="flex flex-wrap gap-1">{allTags.map(t=>(
              <button key={t} onClick={()=>setFilterTag(f=>f===t?"":t)}
                className={`px-2 py-0.5 rounded-full text-xs border transition-all ${filterTag===t?"bg-violet-600 text-white border-violet-600":"bg-violet-50 text-violet-600 border-violet-200 hover:bg-violet-100"}`}>{t}</button>
            ))}</div>
          </div>
        )}
        <div className="px-3 py-3 border-t divider">
          <button onClick={()=>{setGlobalView("trash");setActiveProjectId(null);}}
            className={`nav-btn flex items-center gap-2 w-full px-3 py-2 rounded-lg text-sm transition-all ${globalView==="trash"?"active":""}`}>
            <span>🗑️</span><span>Trash</span>
            {trashCount>0&&<span className="ml-auto text-xs px-1.5 py-0.5 rounded-full bg-red-100 text-red-500">{trashCount}</span>}
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="flex-1 min-w-0">
        {globalView==="trash"?(
          <div className="px-6 py-6 max-w-3xl"><TrashView entries={entries} projects={projects} onRestore={restore} onHardDelete={hardDelete} onEmptyTrash={emptyTrash} /></div>
        ):!activeProject?(
          <div className="flex flex-col items-center justify-center min-h-screen px-8 text-center text-faint">
            <p className="text-5xl mb-4">📚</p>
            <p className="font-serif text-lg mb-2" style={{color:"var(--text)"}}>No project selected</p>
            <p className="text-sm mb-6">Create a project to organize your literature.</p>
            <button onClick={()=>setEditingProject(emptyProject())} className="px-5 py-2.5 bg-green-600 text-white rounded-xl text-sm font-medium hover:bg-green-700">+ Create First Project</button>
          </div>
        ):(
          <>
            {/* Top bar */}
            <div className="border-b divider sticky top-0 z-20" style={{background:"var(--bg2)"}}>
              <div className="px-6 py-4 flex items-center justify-between">
                <div>
                  <h2 className="font-serif text-lg font-semibold" style={{color:"var(--text)"}}>{activeProject.name}</h2>
                  <p className="text-xs text-faint flex flex-wrap gap-x-2">
                    {STATUSES.map(s=>{const n=projectEntries.filter(e=>!e.archived&&(e.status||"to read")===s).length;return n>0?<span key={s}>{n} {s}</span>:null;})}
                  </p>
                </div>
                <button onClick={()=>setQuickAdd(true)} className="px-4 py-2 bg-green-600 text-white rounded-xl text-sm font-medium hover:bg-green-700 shadow-sm">+ Add Source</button>
              </div>
              <div className="px-6 pb-3 flex items-center gap-3 flex-wrap">
                {TABS.map(v=>(
                  <button key={v} onClick={()=>setView(v)} className={`nav-btn px-3 py-1.5 rounded-lg text-sm capitalize transition-all ${view===v?"active":""}`}>
                    {v==="bibliography"?"Annotated Bib":v==="outline"?"Essay Outline":v}
                  </button>
                ))}
              </div>
            </div>

            <div className="px-6 py-6 space-y-4 max-w-3xl">
              {view==="bibliography"&&(
                <div>
                  <div className="flex items-center justify-between mb-5">
                    <div><h3 className="font-serif text-lg" style={{color:"var(--text)"}}>Annotated Bibliography</h3>
                      <p className="text-xs mt-0.5 text-faint">{bibEntries.length} sources · APA 7</p></div>
                    <div className="flex gap-2">
                      <button onClick={()=>{const lines=bibEntries.map(e=>{const qs=(e.quotes||[]).map(q=>`   "${q.text}" (${q.page})`).join("\n");return `${formatApa7(e)}\n${qs}${qs?"\n":""}\n${e.annotation?`   ${e.annotation}`:"   [No annotation]"}`;}).join("\n\n"+"─".repeat(60)+"\n\n");const blob=new Blob([lines],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="annotated_bibliography.txt";a.click();}} className="px-3 py-2 rounded-xl text-xs border hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Export .txt</button>
                      <button onClick={()=>exportDocx(bibEntries)} className="px-3 py-2 rounded-xl text-xs border hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Export .doc</button>
                    </div>
                  </div>
                  {bibEntries.length===0?(<div className="text-center py-16 text-faint"><p className="text-4xl mb-3">📄</p><p className="text-sm">No sources marked "to annotate" yet.</p></div>):(
                    <div className="space-y-6">{bibEntries.map(e=>{
                      const imp=IMPORTANCE.find(i=>i.level===(e.importance||3));
                      return (<div key={e.id} className="card rounded-xl p-5">
                        <div className="flex items-start justify-between gap-2 mb-2">
                          <div style={{paddingLeft:"2em",textIndent:"-2em",flex:1}}><ApaRef e={e} /></div>
                          <button onClick={()=>setReaderEntry(e)} className="shrink-0 text-xs px-2.5 py-1 rounded-lg border border-green-200 text-green-600 hover:bg-green-50 whitespace-nowrap">📖 Read</button>
                        </div>
                        <div className="flex flex-wrap gap-1 mb-2">
                          <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${imp.badge}`}><span className={`w-1.5 h-1.5 rounded-full ${imp.dot}`}></span>{imp.label}</span>
                          {e.paperSection&&<Badge label={e.paperSection} colorClass="bg-yellow-50 text-yellow-700 border border-yellow-200" />}
                          {e.themes.map(t=><Badge key={t} label={t} colorClass="bg-violet-50 text-violet-700 border border-violet-200" />)}
                        </div>
                        {(e.quotes||[]).length>0&&<div className="space-y-2 mb-3">{(e.quotes||[]).map(q=>{
                          const col=HIGHLIGHT_COLORS.find(c=>c.id===q.color)||HIGHLIGHT_COLORS[0];
                          return <div key={q.id} className="rounded-lg px-3 py-2.5 text-sm italic border" style={{borderColor:col.border,background:col.bg,color:"var(--text)"}}>"{q.text}" <span className="text-xs not-italic font-medium" style={{color:"var(--text2)"}}>({q.page})</span></div>;
                        })}</div>}
                        {e.annotation?<p className="text-sm leading-relaxed border-l-2 border-green-300 pl-3 mt-2 whitespace-pre-wrap" style={{color:"var(--text2)"}}>{e.annotation}</p>:<p className="text-sm italic border-l-2 pl-3 mt-2 text-faint" style={{borderColor:"var(--border2)"}}>No annotation yet. Click Read to open the PDF reader.</p>}
                      </div>);
                    })}</div>
                  )}
                </div>
              )}
              {view==="outline"&&<OutlineView project={activeProject} entries={entries} onUpdateProject={updateProject} />}
              {(view==="active"||view==="archive")&&(
                <>
                  <div className="flex gap-2 flex-wrap">
                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search authors, titles, annotations…"
                      className="input flex-1 min-w-40 rounded-xl px-4 py-2 text-sm" />
                    <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="input rounded-xl px-3 py-2 text-sm">
                      <option value="">All statuses</option>
                      {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                    {allTags.length>0&&<select value={filterTag} onChange={e=>setFilterTag(e.target.value)} className="input rounded-xl px-3 py-2 text-sm">
                      <option value="">All tags</option>
                      {allTags.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>}
                    {usedSections.length>0&&<select value={filterSection} onChange={e=>setFilterSection(e.target.value)} className="input rounded-xl px-3 py-2 text-sm">
                      <option value="">All sections</option>
                      {usedSections.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>}
                  </div>
                  {filtered.length===0?(<div className="text-center py-16 text-faint"><p className="text-4xl mb-3">{view==="archive"?"🗃️":"📚"}</p><p className="text-sm">{view==="archive"?"Nothing archived.":"No sources yet."}</p></div>):(
                    <div className="space-y-3">{filtered.map(e=><EntryCard key={e.id} entry={e} onEdit={setEditing} onSoftDelete={softDelete} onCycleStatus={cycleStatus} onCycleImportance={cycleImp} onOpenReader={setReaderEntry} />)}</div>
                  )}
                </>
              )}
            </div>
          </>
        )}
      </div>

      {/* Modals */}
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} dark={dark} onToggleDark={()=>setDark(d=>!d)} entries={entries} projects={projects} />}
      {quickAdd&&<QuickAddModal projectId={activeProjectId} projects={projects} onSave={saveEntry} onCancel={()=>setQuickAdd(false)} />}
      {editing&&<EntryForm entry={editing} project={activeProject} onSave={saveEntry} onCancel={()=>setEditing(null)} />}
      {editingProject&&<ProjectModal project={editingProject} onSave={saveProject} onCancel={()=>setEditingProject(null)} />}
      {showDeleteConfirm&&(
        <div className="fixed inset-0 modal-bg z-50 flex items-center justify-center p-4" onClick={()=>setShowDeleteConfirm(null)}>
          <div className="modal rounded-2xl shadow-2xl w-full max-w-sm p-7" onClick={e=>e.stopPropagation()}>
            <h3 className="font-serif text-lg mb-2" style={{color:"var(--text)"}}>Delete project?</h3>
            <p className="text-sm mb-6 text-muted">This will permanently delete the project and all {entries.filter(e=>e.projectId===showDeleteConfirm).length} sources in it.</p>
            <div className="flex gap-3 justify-end">
              <button onClick={()=>setShowDeleteConfirm(null)} className="px-4 py-2 rounded-lg text-sm border hover:opacity-80" style={{borderColor:"var(--border)",color:"var(--text2)"}}>Cancel</button>
              <button onClick={()=>deleteProject(showDeleteConfirm)} className="px-4 py-2 rounded-lg text-sm bg-red-500 text-white font-medium hover:bg-red-600">Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
