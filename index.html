<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lit Review Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{--bg:#fafaf9;--bg2:#fff;--bg3:#f5f5f4;--bd:#e7e5e4;--bd2:#d6d3d1;--tx:#1c1917;--tx2:#57534e;--tx3:#a8a29e;--card:#fff;--inp:#fff;--inpbd:#e7e5e4;--nav:#1c1917;--navtx:#fff}
.dark{--bg:#0c0a09;--bg2:#1c1917;--bg3:#292524;--bd:#292524;--bd2:#44403c;--tx:#fafaf9;--tx2:#a8a29e;--tx3:#57534e;--card:#1c1917;--inp:#1c1917;--inpbd:#292524;--nav:#fafaf9;--navtx:#1c1917}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:Georgia,serif;font-size:14px}
input,textarea,select,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.card{background:var(--card);border:1px solid var(--bd)}
.inp{background:var(--inp);border:1px solid var(--inpbd);color:var(--tx);border-radius:8px;padding:8px 12px;width:100%}
.inp:focus{outline:none;box-shadow:0 0 0 2px rgba(16,185,129,.3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.reditor{background:var(--inp);border:1px solid var(--inpbd);border-top:none;border-radius:0 0 8px 8px;padding:10px 12px;color:var(--tx);outline:none;line-height:1.7}
.reditor:focus{box-shadow:0 0 0 2px rgba(16,185,129,.3)}
.reditor ul,.reditor ol{padding-left:1.5em}
.tbar{display:flex;gap:4px;flex-wrap:wrap;padding:5px 8px;background:var(--bg3);border:1px solid var(--inpbd);border-radius:8px 8px 0 0}
.tbtn{padding:3px 8px;border-radius:5px;border:1px solid var(--bd2);background:var(--inp);color:var(--tx);cursor:pointer;font-size:12px}
.tbtn:hover{opacity:.75}
.bib-ann{border:1px solid var(--inpbd);border-radius:8px;padding:10px 12px;color:var(--tx);outline:none;line-height:1.7;min-height:80px;background:var(--inp)}
.bib-ann:focus{box-shadow:0 0 0 2px rgba(16,185,129,.3)}
.bib-ann ul,.bib-ann ol{padding-left:1.5em}
.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1917;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:200;pointer-events:none;opacity:1;transition:opacity .4s}
</style>
</head>
<body>
<div id="root"></div>
<script>
var R=React,h=R.createElement;
var useState=R.useState,useEffect=R.useEffect,useRef=R.useRef;
var SKEY="psych-lit-v7",PASSKEY="lit-pass-v7",SETKEY="lit-set-v7";
var STATS=["to read","to annotate","to cite"];
var IMP=[
  {lv:1,lb:"Core",      cl:"#7c3aed",bg:"#ede9fe",bd:"#c4b5fd",tx:"#5b21b6"},
  {lv:2,lb:"Major",     cl:"#0ea5e9",bg:"#e0f2fe",bd:"#7dd3fc",tx:"#0369a1"},
  {lv:3,lb:"Supporting",cl:"#14b8a6",bg:"#f0fdfa",bd:"#99f6e4",tx:"#0f766e"},
  {lv:4,lb:"Background",cl:"#9ca3af",bg:"#f9fafb",bd:"#e5e7eb",tx:"#6b7280"},
  {lv:5,lb:"Peripheral",cl:"#d1d5db",bg:"#f9fafb",bd:"#f3f4f6",tx:"#9ca3af"},
];
var DEFSEC=["Introduction","Literature Review","Argument","Clinical Vignette","Conclusion"];

var ls={
  get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){alert("Storage full.")}},
  del:function(k){try{localStorage.removeItem(k)}catch(e){}},
};

function ep(){return{id:crypto.randomUUID(),projectId:null,author:"",year:"",title:"",journal:"",volume:"",issue:"",pages:"",doi:"",sourceType:"article",themes:[],annotation:"",memo:"",paperSections:[],status:"to read",importance:3,deleted:false,archived:false,inEssay:false,createdAt:Date.now()}}
function eproj(){return{id:crypto.randomUUID(),name:"",description:"",customThemes:[],paperSections:DEFSEC.slice(),createdAt:Date.now()}}
function getImp(lv){return IMP.find(function(i){return i.lv===(lv||3)})||IMP[2]}

function apa7(e){
  if(!e.author&&!e.title)return"";
  var a=e.author?(e.author+(e.author.endsWith(".")?"":".")):""
  var y=e.year?" ("+e.year+").":"";
  var t=e.title?" "+e.title+(e.title.endsWith(".")?"":"."):""
  if(e.sourceType==="book")return a+y+t+(e.journal?" "+e.journal+".":"");
  if(e.sourceType==="chapter")return a+y+t+(e.journal?" In "+e.journal:"")+(e.pages?" (pp. "+e.pages+").":".");
  return a+y+t+(e.journal?" "+e.journal:"")+(e.volume?", "+e.volume:"")+(e.issue?"("+e.issue+")":"")+(e.pages?", "+e.pages:"")+"."+(e.doi?" "+e.doi:"");
}

function inTextCite(e){
  if(!e.author&&!e.year)return"";
  var surname=e.author?e.author.split(",")[0].trim():"";
  var authors=e.author||"";
  // count authors by splitting on & or ;
  var parts=authors.split(/[&;]/).map(function(p){return p.trim()}).filter(Boolean);
  var authorStr="";
  if(parts.length===1)authorStr=surname;
  else if(parts.length===2)authorStr=parts[0].split(",")[0].trim()+" & "+parts[1].split(",")[0].trim();
  else authorStr=surname+" et al.";
  return "("+authorStr+(e.year?", "+e.year:"")+")";
}

function stStyle(s){
  if(s==="to read")return{background:"#f3f4f6",color:"#6b7280",border:"1px solid #e5e7eb"};
  if(s==="to annotate")return{background:"#fffbeb",color:"#b45309",border:"1px solid #fde68a"};
  return{background:"#ecfdf5",color:"#065f46",border:"1px solid #a7f3d0"};
}

function ApaSpan(props){
  var e=props.e,ref=apa7(e);
  if(!ref)return null;
  var tgt=e.sourceType==="book"?e.title:e.journal;
  if(tgt&&ref.includes(tgt)){
    var i=ref.indexOf(tgt);
    return h("span",{style:{fontSize:14,lineHeight:1.6,color:"var(--tx)"}},ref.slice(0,i),h("em",null,tgt),ref.slice(i+tgt.length));
  }
  return h("span",{style:{fontSize:14,lineHeight:1.6,color:"var(--tx)"}},ref);
}

// ── Toast ──────────────────────────────────────────────────────
function useToast(){
  var _t=useState(null),toast=_t[0],setToast=_t[1];
  function show(msg){
    setToast(msg);
    setTimeout(function(){setToast(null)},1800);
  }
  return[toast,show];
}

// ── Rich toolbar ───────────────────────────────────────────────
function RichBar(props){
  var ref=props.edRef;
  function cmd(c){document.execCommand(c,false,null);ref&&ref.current&&ref.current.focus()}
  return h("div",{className:"tbar"},
    h("button",{className:"tbtn",style:{fontWeight:700},onMouseDown:function(e){e.preventDefault();cmd("bold")}},"B"),
    h("button",{className:"tbtn",style:{fontStyle:"italic"},onMouseDown:function(e){e.preventDefault();cmd("italic")}},"I"),
    h("button",{className:"tbtn",style:{textDecoration:"underline"},onMouseDown:function(e){e.preventDefault();cmd("underline")}},"U"),
    h("span",{style:{borderLeft:"1px solid var(--bd2)",margin:"0 2px"}}),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("insertUnorderedList")}},"• List"),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("insertOrderedList")}},"1. List"),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("indent")}},"\u2192"),
    h("button",{className:"tbtn",onMouseDown:function(e){e.preventDefault();cmd("outdent")}},"\u2190")
  );
}

// ── Password Gate ──────────────────────────────────────────────
function PasswordGate(props){
  var stored=ls.get(PASSKEY),setting=!stored;
  var _v=useState(""),val=_v[0],setVal=_v[1];
  var _e=useState(false),err=_e[0],setErr=_e[1];
  function submit(){
    if(setting){if(val.length<3){setErr(true);return}ls.set(PASSKEY,val);props.onUnlock()}
    else{if(val===stored)props.onUnlock();else setErr(true)}
  }
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}},
    h("div",{className:"card",style:{borderRadius:16,padding:32,width:340,boxShadow:"0 4px 24px rgba(0,0,0,.1)"}},
      h("h1",{style:{fontSize:22,marginBottom:4}},"Lit Review"),
      h("p",{style:{color:"var(--tx3)",fontSize:13,marginBottom:20}},setting?"Set a password to protect your research":"Enter your password to continue"),
      h("input",{type:"password",value:val,onChange:function(e){setVal(e.target.value);setErr(false)},onKeyDown:function(e){if(e.key==="Enter")submit()},placeholder:setting?"Choose a password":"Password",autoFocus:true,className:"inp",style:{marginBottom:8,borderColor:err?"#ef4444":""}}),
      err&&h("p",{style:{color:"#ef4444",fontSize:12,marginBottom:8}},setting?"Min 3 characters":"Incorrect password"),
      h("button",{onClick:submit,style:{width:"100%",padding:10,background:"#10b981",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontWeight:600}},setting?"Set Password & Enter":"Unlock")
    )
  );
}

// ── Settings ───────────────────────────────────────────────────
function Settings(props){
  var _ak=useState(function(){var s=ls.get(SETKEY);return s?JSON.parse(s).apiKey||"":""}),ak=_ak[0],setAk=_ak[1];
  var _np=useState(""),np=_np[0],setNp=_np[1];
  var _ok=useState(false),ok=_ok[0],setOk=_ok[1];
  var fr=useRef();
  function saveKey(){var s=ls.get(SETKEY),c=s?JSON.parse(s):{};ls.set(SETKEY,JSON.stringify(Object.assign({},c,{apiKey:ak})))}
  function chPass(){if(np.length>=3){ls.set(PASSKEY,np);setOk(true);setNp("")}}
  function exportData(){
    var blob=new Blob([JSON.stringify({projects:props.projects,entries:props.entries,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="lit-backup-"+Date.now()+".json";a.click();
  }
  function importData(f){
    var r=new FileReader();r.onload=function(){
      try{var d=JSON.parse(r.result);if(d.projects&&d.entries){ls.set(SKEY,JSON.stringify({projects:d.projects,entries:d.entries}));alert("Import successful. Reloading\u2026");window.location.reload()}else alert("Invalid file.")}
      catch(e2){alert("Could not read file.")}
    };r.readAsText(f);
  }
  var row=function(t,c){return h("div",null,h("p",{style:{fontWeight:600,fontSize:14,marginBottom:4}},t),c)};
  return h("div",{className:"overlay",onClick:props.onClose},
    h("div",{className:"card",style:{borderRadius:20,width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto"},onClick:function(e){e.stopPropagation()}},
      h("div",{style:{padding:"18px 24px",borderBottom:"1px solid var(--bd)",fontSize:18,fontWeight:600}},"Settings"),
      h("div",{style:{padding:"18px 24px",display:"flex",flexDirection:"column",gap:18}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("span",{style:{fontWeight:600,fontSize:14}},"Dark Mode"),
          h("button",{onClick:props.onToggleDark,style:{width:44,height:24,borderRadius:12,border:"none",background:props.dark?"#10b981":"#d1d5db",cursor:"pointer",position:"relative"}},
            h("span",{style:{position:"absolute",top:2,left:props.dark?22:2,width:20,height:20,background:"#fff",borderRadius:"50%",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}})
          )
        ),
        row("Anthropic API Key",h("div",null,
          h("p",{style:{color:"var(--tx3)",fontSize:12,marginBottom:6}},"For DOI/URL metadata lookup."),
          h("div",{style:{display:"flex",gap:8}},
            h("input",{type:"password",value:ak,onChange:function(e){setAk(e.target.value)},placeholder:"sk-ant-\u2026",className:"inp",style:{flex:1}}),
            h("button",{onClick:saveKey,style:{padding:"0 14px",background:"#10b981",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}},"Save")
          )
        )),
        row("Data Backup",h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:exportData,className:"inp",style:{flex:1,cursor:"pointer",textAlign:"center"}},"Export JSON"),
          h("button",{onClick:function(){fr.current&&fr.current.click()},className:"inp",style:{flex:1,cursor:"pointer",textAlign:"center"}},"Import JSON"),
          h("input",{ref:fr,type:"file",accept:".json",style:{display:"none"},onChange:function(e){if(e.target.files[0])importData(e.target.files[0])}})
        )),
        row("Change Password",h("div",null,
          h("div",{style:{display:"flex",gap:8}},
            h("input",{type:"password",value:np,onChange:function(e){setNp(e.target.value)},placeholder:"New password",className:"inp",style:{flex:1}}),
            h("button",{onClick:chPass,style:{padding:"0 14px",background:"#10b981",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}},"Update")
          ),
          ok&&h("p",{style:{color:"#10b981",fontSize:12,marginTop:4}},"Password updated.")
        ))
      ),
      h("div",{style:{padding:"12px 24px",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"flex-end"}},
        h("button",{onClick:props.onClose,className:"inp",style:{width:"auto",padding:"6px 16px",cursor:"pointer"}},"Close")
      )
    )
  );
}

// ── Entry Form ─────────────────────────────────────────────────
function EntryForm(props){
  var _f=useState(props.entry),form=_f[0],setForm=_f[1];
  var _nt=useState(""),nt=_nt[0],setNt=_nt[1];
  var annRef=useRef(),memoRef=useRef();
  var allThemes=props.project?props.project.customThemes||[]:[];
  var secs=props.project?(props.project.paperSections||DEFSEC):DEFSEC;
  function set(k,v){setForm(function(f){return Object.assign({},f,{[k]:v})})}
  function togTheme(t){setForm(function(f){return Object.assign({},f,{themes:f.themes.includes(t)?f.themes.filter(function(x){return x!==t}):f.themes.concat([t])})})}
  function togSec(s){setForm(function(f){var cur=f.paperSections||[];return Object.assign({},f,{paperSections:cur.includes(s)?cur.filter(function(x){return x!==s}):cur.concat([s])})})}
  function addInline(){var t=nt.trim().toLowerCase();if(t){if(props.project&&!allThemes.includes(t))props.project.customThemes.push(t);togTheme(t)}setNt("")}
  function saveForm(){
    var out=Object.assign({},form);
    if(annRef.current)out.annotation=annRef.current.innerHTML;
    if(memoRef.current)out.memo=memoRef.current.innerHTML;
    props.onSave(out);
  }
  useEffect(function(){if(annRef.current)annRef.current.innerHTML=form.annotation||""},[]);
  useEffect(function(){if(memoRef.current)memoRef.current.innerHTML=form.memo||""},[]);
  function cmd(c,ref){document.execCommand(c,false,null);ref&&ref.current&&ref.current.focus()}
  var lbl=function(t){return h("label",{style:{fontSize:11,fontWeight:600,color:"var(--tx3)",textTransform:"uppercase",letterSpacing:".06em",display:"block",marginBottom:4}},t)};
  return h("div",{className:"overlay",onClick:props.onCancel},
    h("div",{className:"card",style:{borderRadius:20,width:"100%",maxWidth:640,maxHeight:"92vh",overflowY:"auto"},onClick:function(e){e.stopPropagation()}},
      h("div",{style:{padding:"18px 24px",borderBottom:"1px solid var(--bd)"}},
        h("h2",{style:{fontSize:18}},props.entry.author?"Edit Entry":"Add Entry"),
        props.project&&h("p",{style:{fontSize:12,color:"var(--tx3)",marginTop:2}},"Project: ",h("span",{style:{color:"#10b981",fontWeight:600}},props.project.name))
      ),
      h("div",{style:{padding:"18px 24px",display:"flex",flexDirection:"column",gap:14}},
        h("div",null,lbl("Source Type"),
          h("div",{style:{display:"flex",gap:8}},
            ["article","book","chapter"].map(function(t){return h("button",{key:t,onClick:function(){set("sourceType",t)},style:{flex:1,padding:8,borderRadius:8,border:"1px solid var(--bd2)",cursor:"pointer",fontWeight:form.sourceType===t?600:400,background:form.sourceType===t?"var(--nav)":"var(--bg3)",color:form.sourceType===t?"var(--navtx)":"var(--tx2)"}},t==="chapter"?"Book Chapter":t==="book"?"Book":"Journal Article")})
          )
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}},
          h("div",null,lbl("Status"),
            h("div",{style:{display:"flex",gap:6}},
              STATS.map(function(s){var active=(form.status||"to read")===s,ss=stStyle(s);return h("button",{key:s,onClick:function(){set("status",s)},style:Object.assign({},ss,{flex:1,padding:"6px 4px",borderRadius:8,cursor:"pointer",fontWeight:active?700:400,fontSize:12,opacity:active?1:.5})},s)})
            )
          ),
          h("div",null,lbl("Importance"),
            h("div",{style:{display:"flex",gap:4}},
              IMP.map(function(imp){var active=(form.importance||3)===imp.lv;return h("button",{key:imp.lv,onClick:function(){set("importance",imp.lv)},title:imp.lb,style:{flex:1,padding:"6px 2px",borderRadius:8,border:"none",cursor:"pointer",background:active?"var(--nav)":"var(--bg3)",color:active?"var(--navtx)":"var(--tx2)",display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
                h("span",{style:{width:10,height:10,borderRadius:"50%",background:imp.cl,display:"block"}}),
                h("span",{style:{fontSize:10}},imp.lb)
              )})
            )
          )
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 100px",gap:10}},
          h("div",null,lbl("Author(s)"),h("input",{value:form.author,onChange:function(e){set("author",e.target.value)},placeholder:"Kohut, H.",className:"inp"})),
          h("div",null,lbl("Year"),h("input",{value:form.year,onChange:function(e){set("year",e.target.value)},placeholder:"2003",className:"inp"}))
        ),
        h("div",null,lbl("Title"),h("input",{value:form.title,onChange:function(e){set("title",e.target.value)},placeholder:"Title",className:"inp"})),
        h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10}},
          h("div",null,lbl(form.sourceType==="book"?"Publisher":form.sourceType==="chapter"?"Book/Editors":"Journal"),h("input",{value:form.journal,onChange:function(e){set("journal",e.target.value)},className:"inp"})),
          h("div",null,lbl("Pages"),h("input",{value:form.pages,onChange:function(e){set("pages",e.target.value)},placeholder:"45\u201367",className:"inp"}))
        ),
        form.sourceType==="article"&&h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          h("div",null,lbl("Volume"),h("input",{value:form.volume,onChange:function(e){set("volume",e.target.value)},placeholder:"12",className:"inp"})),
          h("div",null,lbl("Issue"),h("input",{value:form.issue,onChange:function(e){set("issue",e.target.value)},placeholder:"3",className:"inp"}))
        ),
        h("div",null,lbl("DOI / PEP-Web URL"),h("input",{value:form.doi,onChange:function(e){set("doi",e.target.value)},placeholder:"https://doi.org/\u2026",className:"inp"})),
        secs.length>0&&h("div",null,lbl("Paper Sections"),
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
            secs.map(function(s){var active=(form.paperSections||[]).includes(s);return h("button",{key:s,onClick:function(){togSec(s)},style:{padding:"4px 12px",borderRadius:20,border:"1px solid",fontSize:12,fontWeight:500,cursor:"pointer",borderColor:active?"#f59e0b":"var(--bd2)",background:active?"#fef3c7":"var(--bg3)",color:active?"#92400e":"var(--tx2)"}},active?"\u2713 "+s:s)})
          )
        ),
        h("div",null,lbl("Tags"),
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}},
            allThemes.map(function(t){var active=form.themes.includes(t);return h("button",{key:t,onClick:function(){togTheme(t)},style:{padding:"4px 12px",borderRadius:20,border:"1px solid",fontSize:12,fontWeight:500,cursor:"pointer",borderColor:active?"#7c3aed":"var(--bd2)",background:active?"#ede9fe":"var(--bg3)",color:active?"#5b21b6":"var(--tx2)"}},active?"\u2713 "+t:t)})
          ),
          h("div",{style:{display:"flex",gap:8}},
            h("input",{value:nt,onChange:function(e){setNt(e.target.value)},onKeyDown:function(e){if(e.key==="Enter")addInline()},placeholder:"Add tag\u2026",className:"inp",style:{flex:1,fontSize:13}}),
            h("button",{onClick:addInline,style:{padding:"0 14px",background:"#7c3aed",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}},"Add")
          )
        ),
        h("div",null,lbl("Annotation"),
          h("div",{className:"tbar"},
            ["bold","italic","underline"].map(function(c,i){return h("button",{key:c,className:"tbtn",style:{fontWeight:c==="bold"?700:400,fontStyle:c==="italic"?"italic":"normal",textDecoration:c==="underline"?"underline":"none"},onMouseDown:function(ev){ev.preventDefault();cmd(c,annRef)}},["B","I","U"][i])}),
            h("span",{style:{borderLeft:"1px solid var(--bd2)",margin:"0 2px"}}),
            h("button",{className:"tbtn",onMouseDown:function(ev){ev.preventDefault();cmd("insertUnorderedList",annRef)}},"• List"),
            h("button",{className:"tbtn",onMouseDown:function(ev){ev.preventDefault();cmd("insertOrderedList",annRef)}},"1. List")
          ),
          h("div",{ref:annRef,contentEditable:true,suppressContentEditableWarning:true,className:"reditor",style:{minHeight:140}})
        ),
        h("div",null,lbl("Private Memo"),
          h("div",{className:"tbar"},
            ["bold","italic","underline"].map(function(c,i){return h("button",{key:c,className:"tbtn",onMouseDown:function(ev){ev.preventDefault();cmd(c,memoRef)}},["B","I","U"][i])})
          ),
          h("div",{ref:memoRef,contentEditable:true,suppressContentEditableWarning:true,className:"reditor",style:{minHeight:70,background:"var(--bg3)"}})
        )
      ),

    editing&&h(EntryForm,{entry:editing,project:activeProject,onSave:saveEntry,onCancel:function(){setEditing(null)}}),
    editProj&&h(ProjModal,{project:editProj,onSave:saveProject,onCancel:function(){setEditProj(null)}}),
    showDel&&h("div",{className:"overlay",onClick:function(){setShowDel(null)}},
      h("div",{className:"card",style:{borderRadius:20,width:"100%",maxWidth:360,padding:28},onClick:function(e){e.stopPropagation()}},
        h("h3",{style:{fontSize:18,marginBottom:8}},"Delete project?"),
        h("p",{style:{fontSize:13,color:"var(--tx2)",marginBottom:20}},"This will permanently delete the project and all "+entries.filter(function(e){return e.projectId===showDel}).length+" sources in it."),
        h("div",{style:{display:"flex",gap:10,justifyContent:"flex-end"}},
          h("button",{onClick:function(){setShowDel(null)},className:"inp",style:{width:"auto",padding:"6px 16px",cursor:"pointer"}},"Cancel"),
          h("button",{onClick:function(){deleteProject(showDel)},style:{padding:"8px 18px",background:"#ef4444",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}},"Delete")
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>
</body>
</html>
